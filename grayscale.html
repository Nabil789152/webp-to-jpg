<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conversion en niveaux de gris | Image Tools Pro</title>

<meta name="description" content="Convertissez vos images RVB en niveaux de gris gratuitement en ligne. Outil rapide et sécurisé.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Conversion en niveaux de gris</h1>
</header>

<div class="box">

  <h2>Conversion en niveaux de gris</h2>

  <!-- DROP ZONE -->
  <div id="dropZone" class="drop-zone">
    <p>📁 Glissez une image ici ou cliquez pour choisir</p>
    <input type="file" id="grayInput" accept="image/*" hidden>
  </div>

  <canvas id="grayCanvas"></canvas>

  <br>

  <button onclick="convertToGray()">Convertir</button>
  <button onclick="downloadGray()">Télécharger</button>

</div>

<footer>

<p>© 2026 Image Tools Pro — Outils d’images gratuits en ligne</p>

<a href="index.html">Accueil</a>
<a href="about.html">À propos</a>
<a href="contact.html">Contact</a>
<a href="privacy.html">Politique de confidentialité</a>
<a href="terms.html">Conditions d’utilisation</a>

</footer>

<script>
let grayImage = null;

const dropZone = document.getElementById("dropZone");
const input = document.getElementById("grayInput");

// =========================
// OPEN FILE DIALOG
// =========================
dropZone.addEventListener("click", () => {
  input.click();
});

// =========================
// DRAG OVER
// =========================
dropZone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropZone.classList.add("drag-active");
});

// =========================
// DRAG LEAVE
// =========================
dropZone.addEventListener("dragleave", () => {
  dropZone.classList.remove("drag-active");
});

// =========================
// DROP FILE
// =========================
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("drag-active");

  const file = e.dataTransfer.files[0];
  if (file) handleImage(file);
});

// =========================
// INPUT FILE
// =========================
input.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (file) handleImage(file);
});

// =========================
// IMAGE HANDLER
// =========================
function handleImage(file) {
  const img = new Image();

  img.onload = function () {
    const canvas = document.getElementById("grayCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    grayImage = ctx.getImageData(0, 0, canvas.width, canvas.height);
  };

  img.src = URL.createObjectURL(file);
}

// =========================
// CONVERT TO GRAY
// =========================
function convertToGray() {
  if (!grayImage) return;

  const canvas = document.getElementById("grayCanvas");
  const ctx = canvas.getContext("2d");

  let data = grayImage.data;

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    const gray = 0.299 * r + 0.587 * g + 0.114 * b;

    data[i] = data[i + 1] = data[i + 2] = gray;
  }

  ctx.putImageData(grayImage, 0, 0);
}

// =========================
// DOWNLOAD
// =========================
function downloadGray() {
  const canvas = document.getElementById("grayCanvas");
  const link = document.createElement("a");
  link.download = "image-grayscale.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
