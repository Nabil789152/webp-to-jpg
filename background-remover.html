<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Background Remover Free Online | Image Tools Pro</title>

<meta name="description" content="Remove image background online for free. Fast, simple and secure background remover tool.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Background Remover</h1>
  <p>Remove image background instantly online</p>
</header>

<div class="container">

  <div class="box">

    <input type="file" id="file" accept="image/*">

    <button onclick="removeBg()">Remove Background</button>

  </div>

  <div class="preview" id="preview"></div>

</div>

<script>
let img = new Image();

/* LOAD IMAGE */
document.getElementById("file").onchange = (e) => {
const file = e.target.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = ev => {
img.src = ev.target.result;

img.onload = () => {
document.getElementById("preview").innerHTML = `
<div>
<p>Original Image</p>
<img src="${img.src}" alt="original">
</div>
`;
};
};

reader.readAsDataURL(file);
};

/* SIMPLE FAKE BG REMOVER (client-side demo) */
function removeBg(){

if(!img.src){
alert("Ajoute une image");
return;
}

/* NOTE: vrai background removal nécessite API */
document.getElementById("preview").innerHTML += `
<div>
<p>Background Removed (demo)</p>
<img src="${img.src}" alt="result">
<p style="color:#999;">(API nécessaire pour suppression réelle)</p>
</div>
`;

}
</script>
