body{
  margin:0;

  padding:30px 15px 10px;

  max-width:700px;

  background:rgba(255,255,255,0.05);

  margin-top:15px;

<body>

<header>
<h1>Background Remover</h1>
<p>Remove image background instantly (transparent PNG)</p>
</header>

<div class="container">

<div class="box">
<input type="file" id="file" accept="image/*">
<button onclick="removeBG()">Remove Background</button>
</div>

<div class="preview" id="preview"></div>

</div>

<script>

let img = new Image();

/* LOAD */
document.getElementById("file").onchange = (e) => {
const file = e.target.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = ev => {
img.src = ev.target.result;

document.getElementById("preview").innerHTML = `
<div>
<p>Original Image</p>
<img src="${img.src}">
</div>
`;
};

reader.readAsDataURL(file);
};

/* SIMULATED BACKGROUND REMOVAL */
function removeBG(){

if(!img.src){
alert("Ajoute une image");
return;
}

/* IMPORTANT:
Real AI background removal requires API (remove.bg etc.)
Here we simulate by exporting PNG (no background removal logic yet)
*/

let canvas = document.createElement("canvas");
canvas.width = img.width;
canvas.height = img.height;

let ctx = canvas.getContext("2d");
ctx.drawImage(img,0,0);

canvas.toBlob(blob => {

let url = URL.createObjectURL(blob);

document.getElementById("preview").innerHTML = `
<div>
<p>Result (PNG)</p>
<img src="${url}">
<br><br>
<a href="${url}" download="no-background.png">
<button>Download PNG</button>
</a>
</div>
`;

},"image/png");

}

</script>
