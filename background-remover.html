<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Background Remover IA | Image Tools Pro</title>

<link rel="stylesheet" href="style.css">

<style>

.page-title{
  margin:30px 0 10px;
  font-size:28px;
  font-weight:600;
}

.sub-title{
  color:#6e6e73;
  margin-bottom:20px;
}

.preview-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  max-width:900px;
  margin:30px auto;
  padding:0 20px;
}

.preview-box{
  background:#fff;
  border-radius:16px;
  padding:15px;
  box-shadow:0 8px 25px rgba(0,0,0,0.06);
}

.preview-box img{
  width:100%;
  border-radius:12px;
}

/* BUTTON */
.btn{
  margin-top:20px;
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#0071e3;
  color:#fff;
  font-weight:500;
  cursor:pointer;
}

.btn:hover{
  background:#005bb5;
}

/* LOADER */
.loader{
  display:none;
  margin-top:15px;
  color:#6e6e73;
}

</style>

</head>

<body>

<header>
  <h1>Image Tools Pro</h1>
  <p>Suppression d’arrière-plan IA</p>
</header>

<h2 class="page-title">Background Remover IA</h2>
<p class="sub-title">Téléchargez une image → obtenez un fond transparent instantané</p>

<!-- DROP -->
<div class="drop-zone" id="dropZone">
  <p>📁 Glissez ou cliquez pour importer une image</p>
  <input type="file" id="fileInput" accept="image/*" hidden>
</div>

<div class="preview-grid">

  <div class="preview-box">
    <h3>Image originale</h3>
    <img id="previewOriginal">
  </div>

  <div class="preview-box">
    <h3>Résultat IA</h3>
    <img id="previewResult">
  </div>

</div>

<button class="btn" onclick="removeBackground()">Supprimer le fond (IA)</button>

<div class="loader" id="loader">⏳ Traitement en cours...</div>

<script>

const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const previewOriginal = document.getElementById("previewOriginal");
const previewResult = document.getElementById("previewResult");
const loader = document.getElementById("loader");

let imageFile = null;

/* CLICK */
dropZone.onclick = () => fileInput.click();

/* DROP */
dropZone.addEventListener("dragover", e => {
  e.preventDefault();
  dropZone.classList.add("drag-active");
});

dropZone.addEventListener("dragleave", () => {
  dropZone.classList.remove("drag-active");
});

dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("drag-active");
  handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener("change", e => {
  handleFile(e.target.files[0]);
});

function handleFile(file){
  imageFile = file;

  const reader = new FileReader();
  reader.onload = e => {
    previewOriginal.src = e.target.result;
  }
  reader.readAsDataURL(file);
}

/* =========================
REMOVE BG API (PRO)
========================= */

async function removeBackground(){

  if(!imageFile) return;

  loader.style.display = "block";

  const formData = new FormData();
  formData.append("image_file", imageFile);
  formData.append("size", "auto");

  try{

    const response = await fetch("https://api.remove.bg/v1.0/removebg", {
      method: "POST",
      headers: {
        "X-Api-Key": "TA_CLE_API_ICI"
      },
      body: formData
    });

    if(!response.ok){
      throw new Error("Erreur API");
    }

    const blob = await response.blob();
    const url = URL.createObjectURL(blob);

    previewResult.src = url;

  }catch(err){
    alert("Erreur lors du traitement de l’image");
  }

  loader.style.display = "none";
}

</script>

</body>
</html>
