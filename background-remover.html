<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Background Remover IA | Image Tools Pro</title>

<link rel="stylesheet" href="style.css">

<style>

.page-title{
  margin:30px 0 10px;
  font-size:28px;
  font-weight:600;
}

.sub-title{
  color:#6e6e73;
  margin-bottom:20px;
}

/* DROP ZONE STYLE (sécurisé) */
.drop-zone{
  max-width:700px;
  margin:20px auto;
  padding:45px;
  border:2px dashed #c7c7cc;
  border-radius:18px;
  background:white;
  cursor:pointer;
  transition:0.25s;
}

.drop-zone.drag-active{
  border-color:#0071e3;
  background:rgba(0,113,227,0.08);
  transform:scale(1.02);
}

/* PREVIEW */
.preview-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  max-width:900px;
  margin:30px auto;
  padding:0 20px;
}

.preview-box{
  background:#fff;
  border-radius:16px;
  padding:15px;
  box-shadow:0 8px 25px rgba(0,0,0,0.06);
}

.preview-box img{
  width:100%;
  border-radius:12px;
}

/* BUTTON */
.btn{
  margin-top:20px;
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#0071e3;
  color:#fff;
  font-weight:500;
  cursor:pointer;
}

.btn:hover{
  background:#005bb5;
}

/* LOADER */
.loader{
  display:none;
  margin-top:15px;
  color:#6e6e73;
}

</style>

</head>

<body>

<header>
  <h1>Image Tools Pro</h1>
  <p>Suppression d’arrière-plan IA</p>
</header>

<h2 class="page-title">Background Remover IA</h2>
<p class="sub-title">Glissez une image ou cliquez pour commencer</p>

<!-- DROP -->
<div class="drop-zone" id="dropZone">
  <p>📁 Glissez ou cliquez pour importer une image</p>
  <input type="file" id="fileInput" accept="image/*" hidden>
</div>

<!-- PREVIEW -->
<div class="preview-grid">

  <div class="preview-box">
    <h3>Image originale</h3>
    <img id="previewOriginal">
  </div>

  <div class="preview-box">
    <h3>Résultat IA</h3>
    <img id="previewResult">
  </div>

</div>

<!-- BUTTON -->
<button class="btn" onclick="removeBackground()">
  Supprimer le fond (IA)
</button>

<button class="btn" onclick="downloadImage()">
  Télécharger l’image
</button>

<div class="loader" id="loader">⏳ Traitement en cours...</div>

<script>

/* =========================
ELEMENTS
========================= */
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const previewOriginal = document.getElementById("previewOriginal");
const previewResult = document.getElementById("previewResult");
const loader = document.getElementById("loader");

let imageFile = null;

/* =========================
UPLOAD EVENTS
========================= */
dropZone.onclick = () => fileInput.click();

dropZone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropZone.classList.add("drag-active");
});

dropZone.addEventListener("dragleave", () => {
  dropZone.classList.remove("drag-active");
});

dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("drag-active");
  handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener("change", (e) => {
  handleFile(e.target.files[0]);
});

/* =========================
HANDLE FILE
========================= */
function handleFile(file){
  if(!file) return;

  imageFile = file;

  const reader = new FileReader();
  reader.onload = (e) => {
    previewOriginal.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

/* =========================
REMOVE BACKGROUND (WORKER)
========================= */
async function removeBackground(){

  if(!imageFile){
    alert("Veuillez ajouter une image");
    return;
  }

  loader.style.display = "block";

  const formData = new FormData();
  formData.append("image_file", imageFile);
  formData.append("size", "auto");

  try {

    const response = await fetch("https://bg-remover.nabilguettar7.workers.dev", {
      method: "POST",
      body: formData
    });

    if(!response.ok){
      throw new Error("Erreur API");
    }

    const blob = await response.blob();
    const url = URL.createObjectURL(blob);

    previewResult.src = url;

  } catch (err) {
    alert("Erreur lors du traitement de l'image");
  } finally {
    loader.style.display = "none";
  }
}

function downloadImage() {
  if (!previewResult.src) {
    alert("Aucune image à télécharger");
    return;
  }

  const link = document.createElement("a");
  link.href = previewResult.src;
  link.download = "image-sans-fond.png";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
  
</script>

</body>
</html>
