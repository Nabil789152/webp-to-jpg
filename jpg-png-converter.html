<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JPG ↔ PNG Converter Online Free | Image Tools Pro</title>

<meta name="description" content="Convert JPG to PNG and PNG to JPG online for free. Fast, secure and easy image format converter.">
<meta name="robots" content="index, follow">

<meta property="og:title" content="JPG ↔ PNG Converter">
<meta property="og:description" content="Convert images between JPG and PNG formats instantly online.">
<meta property="og:type" content="website">

<link rel="icon" type="image/png" href="./favicon.png">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05070d;
  color:#e6fff9;
  text-align:center;
}

header{
  padding:30px 15px 10px;
}

h1{
  color:#00ffcc;
  font-size:26px;
}

p{
  color:#9fffe6;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.box{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:12px;
  border:1px solid rgba(0,255,204,0.2);
  margin-top:15px;
}

input, select{
  margin-top:10px;
  padding:10px;
  border-radius:8px;
}

button{
  margin-top:15px;
  padding:12px 20px;
  background:linear-gradient(90deg,#00ffcc,#7c4dff);
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  color:#000;
}

.preview img{
  max-width:250px;
  margin-top:15px;
  border-radius:10px;
  border:1px solid #00ffcc;
}

/* FOOTER UNIFORME */
footer{
  margin-top:60px;
  padding:25px 20px;
  background:#0b0f19;
  border-top:1px solid rgba(255,255,255,0.08);
  text-align:center;
}

footer a{
  color:#00ffcc;
  text-decoration:none;
  margin:0 8px;
  font-size:14px;
}
</style>
</head>

<body>

<header>
  <h1>JPG ↔ PNG Converter</h1>
  <p>Convert images between JPG and PNG instantly</p>
</header>

<div class="container">

<div class="box">

<input type="file" id="file" accept="image/*">

<select id="format">
  <option value="image/jpeg">Convert to JPG</option>
  <option value="image/png">Convert to PNG</option>
</select>

<button onclick="convert()">Convertir</button>

</div>

<div class="preview" id="preview"></div>

</div>

<script>

let img = new Image();

/* LOAD IMAGE */
document.getElementById("file").onchange = (e) => {
const file = e.target.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = ev => {
img.src = ev.target.result;

img.onload = () => {
document.getElementById("preview").innerHTML = `
<div>
<p>Image originale</p>
<img src="${img.src}">
</div>
`;
};
};

reader.readAsDataURL(file);
};

/* CONVERT */
function convert(){

if(!img.src){
alert("Ajoute une image");
return;
}

let format = document.getElementById("format").value;

let canvas = document.createElement("canvas");
canvas.width = img.width;
canvas.height = img.height;

canvas.getContext("2d").drawImage(img,0,0);

canvas.toBlob(blob => {

let url = URL.createObjectURL(blob);

document.getElementById("preview").innerHTML = `
<div>
<p>Image convertie</p>
<img src="${url}">
<br><br>
<a href="${url}" download="converted">
<button>Télécharger</button>
</a>
</div>
`;

}, format);

}

</script>
