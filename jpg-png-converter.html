<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Convertisseur JPG ↔ PNG gratuit en ligne | Image Tools Pro</title>

<meta name="description" content="Convertissez vos images JPG en PNG ou PNG en JPG gratuitement en ligne.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="style.css">

<style>
.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.preview img{
  max-width:260px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:15px;
}

.small{
  color:#5f6368;
  font-size:13px;
}

.box{
  margin-top:15px;
}
</style>

</head>

<body>

<header>
  <h1>Convertisseur JPG ↔ PNG</h1>
  <p>Convertir JPG et PNG instantanément</p>
</header>

<div class="container">

<div class="box">

<input type="file" id="file" accept=".jpg,.jpeg,.png">

<div class="box">
<p class="small">Format détecté : <span id="formatDetected">-</span></p>
</div>

<select id="format">
  <option value="image/png">PNG</option>
  <option value="image/jpeg">JPG</option>
</select>

<button onclick="convert()">Convertir</button>

</div>

<div class="preview" id="preview"></div>

</div>

<script>

let img = new Image();
let fileName = "image";

document.getElementById("file").addEventListener("change", function () {
  const file = this.files[0];
  if (!file) return;

  fileName = file.name.split(".")[0];

  const name = file.name.toLowerCase();

  if (!name.endsWith(".jpg") && !name.endsWith(".jpeg") && !name.endsWith(".png")) {
    alert("Seuls les fichiers .jpg, .jpeg et .png sont autorisés !");
    this.value = "";
    return;
  }

  document.getElementById("formatDetected").innerText = file.type;

  const reader = new FileReader();

  reader.onload = ev => {
    img.src = ev.target.result;

    img.onload = () => {
      document.getElementById("preview").innerHTML = `
        <div>
          <p>Image originale</p>
          <img src="${img.src}" alt="image originale">
        </div>
      `;
    };
  };

  reader.readAsDataURL(file);
});

function convert(){

if(!img.src){
alert("Veuillez ajouter une image !");
return;
}

let format = document.getElementById("format").value;

let canvas = document.createElement("canvas");
canvas.width = img.width;
canvas.height = img.height;

let ctx = canvas.getContext("2d");

/* IMPORTANT : fond blanc pour PNG → JPG */
if(format === "image/jpeg"){
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

ctx.drawImage(img,0,0);

canvas.toBlob(blob => {

let url = URL.createObjectURL(blob);

let ext = format === "image/png" ? "png" : "jpg";

document.getElementById("preview").innerHTML += `
<div>
<p>Image convertie</p>
<img src="${url}" alt="image convertie">
<br><br>
<a href="${url}" download="${fileName}-converti.${ext}">
<button>Télécharger</button>
</a>
</div>
`;

}, format);

}

</script>

<footer>
  <p>© 2026 Image Tools Pro</p>
</footer>

</body>
</html>
