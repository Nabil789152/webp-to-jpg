<style>
.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.preview img{
  max-width:260px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:15px;
}

.small{
  color:#5f6368;
  font-size:13px;
}
</style>

<body>

<!-- HEADER -->
<header>
  <h1>JPG ↔ PNG Converter</h1>
  <p>Convert JPG to PNG or PNG to JPG instantly</p>
</header>

<!-- MAIN -->
<div class="container">

<div class="box">

<input type="file" id="file" accept="image/*">

<div class="box">
<p class="small">Format détecté : <span id="formatDetected">-</span></p>
</div>

<select id="format">
  <option value="image/png">PNG</option>
  <option value="image/jpeg">JPG</option>
</select>

<button onclick="convert()">Convertir</button>

</div>

<!-- PREVIEW -->
<div class="preview" id="preview"></div>

</div>

<script>

let img = new Image();

/* LOAD FILE */
document.getElementById("file").onchange = (e) => {
const file = e.target.files[0];
if(!file) return;

document.getElementById("formatDetected").innerText = file.type || "inconnu";

const reader = new FileReader();

reader.onload = ev => {
img.src = ev.target.result;

img.onload = () => {
document.getElementById("preview").innerHTML = `
<div>
<p>Image originale</p>
<img src="${img.src}" alt="original image">
</div>
`;
};
};

reader.readAsDataURL(file);
};

/* CONVERT */
function convert(){

if(!img.src){
alert("Ajoute une image !");
return;
}

let format = document.getElementById("format").value;

let canvas = document.createElement("canvas");
canvas.width = img.width;
canvas.height = img.height;

canvas.getContext("2d").drawImage(img,0,0);

canvas.toBlob(blob => {

let url = URL.createObjectURL(blob);

document.getElementById("preview").innerHTML += `
<div>

<p>Image convertie</p>

<img src="${url}" alt="converted image">

<br><br>

<a href="${url}" download="converted">
<button>Télécharger</button>
</a>

</div>
`;

}, format);

}

</script>
