<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JFIF to JPG Converter Online Free | Image Tools Pro</title>

<meta name="description" content="Convert JFIF images to JPG online for free. Fast, secure and easy JFIF to JPG converter tool.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>JFIF to JPG Converter</h1>
  <p>Convert JFIF images to JPG instantly</p>
</header>

<div class="container">

  <div class="box">

    <input type="file" id="file" accept="image/jpeg,image/jfif">

    <div class="box">
      <p id="info">Format détecté : -</p>
    </div>

    <button onclick="convert()">Convert to JPG</button>

  </div>

  <div class="preview" id="preview"></div>

</div>

<script>

let img = new Image();

/* LOAD IMAGE */
document.getElementById("file").onchange = (e) => {

  const file = e.target.files[0];
  if(!file) return;

  const type = file.type.toLowerCase();

  if(!type.includes("jpeg") && !type.includes("jfif")){
    alert("Please upload a JFIF or JPG image");
    return;
  }

  document.getElementById("info").innerText = "Format détecté : " + file.type;

  const reader = new FileReader();

  reader.onload = ev => {
    img.src = ev.target.result;

    img.onload = () => {
      document.getElementById("preview").innerHTML = `
        <div class="box">
          <p>Original Image</p>
          <img src="${img.src}" alt="original image">
        </div>
      `;
    };
  };

  reader.readAsDataURL(file);
};

/* CONVERT */
function convert(){

  if(!img.src){
    alert("Please upload an image");
    return;
  }

  let canvas = document.createElement("canvas");
  canvas.width = img.width;
  canvas.height = img.height;

  let ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0);

  canvas.toBlob(blob => {

    let url = URL.createObjectURL(blob);

    document.getElementById("preview").innerHTML += `
      <div class="box">

        <p>Converted JPG</p>

        <img src="${url}" alt="converted image">

        <br><br>

        <a href="${url}" download="converted.jpg">
          <button>Download JPG</button>
        </a>

      </div>
    `;

  }, "image/jpeg", 0.92);

}

</script>
