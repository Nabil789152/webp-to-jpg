<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NeoImage SaaS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05070d;
  color:#e6fff9;
}

header{
  text-align:center;
  padding:40px 20px;
}

h1{
  color:#00ffcc;
  font-size:40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
  max-width:1000px;
  margin:auto;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:12px;
  border:1px solid rgba(0,255,204,0.2);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
  border-color:#00ffcc;
}

a{
  text-decoration:none;
  color:#e6fff9;
}

.btn{
  display:inline-block;
  margin-top:10px;
  padding:10px 15px;
  background:linear-gradient(90deg,#00ffcc,#7c4dff);
  border-radius:8px;
  color:black;
  font-weight:bold;
}

footer{
  text-align:center;
  padding:30px;
  opacity:0.6;
  font-size:12px;
}
</style>
</head>

<body>

<header>
<h1>NeoImage SaaS</h1>
<p>Plateforme d’outils d’images gratuits</p>
</header>

<div class="grid">

<div class="card">
<h3>Convertisseur</h3>
<p>WEBP / PNG / JPG</p>
<a class="btn" href="converter.html">Ouvrir</a>
</div>

<div class="card">
<h3>Resize Pro</h3>
<p>Redimensionner images</p>
<a class="btn" href="resize.html">Ouvrir</a>
</div>

<div class="card">
<h3>Compression</h3>
<p>Réduire taille image</p>
<a class="btn" href="compress.html">Ouvrir</a>
</div>

<div class="card">
<h3>All Tools</h3>
<p>Hub central</p>
<a class="btn" href="tools.html">Voir</a>
</div>

</div>

<footer>
© 2026 NeoImage SaaS • Built for speed & simplicity
</footer>

</body>
</html>
