<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Convertisseur d’images en ligne | WEBP PNG JPG Tool</title>

<meta name="description" content="Convertissez WEBP, PNG, JPG gratuitement en ligne. Compression, conversion multiple et ZIP." />
<meta name="keywords" content="webp to jpg, png to jpg, image converter, compress image, jpg converter online" />
<link rel="canonical" href="https://nabil789152.github.io/webp-to-jpg/" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
:root{
  --primary:#00c853;
  --bg:#0b1f14;
  --card:#121a24;
  --text:#e8f5e9;
  --muted:#9ccc9c;
}
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#06130b,#0b1f14);
  color:var(--text);
  text-align:center;
}
.container{
  max-width:1000px;
  margin:40px auto;
  padding:25px;
  background:rgba(18,26,36,0.9);
  border-radius:18px;
}
h1{color:var(--primary)}
.dropzone{
  padding:35px;
  border:2px dashed var(--primary);
  border-radius:12px;
  margin:20px 0;
  cursor:pointer;
}
.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin:15px 0;
}
select,input,button{
  padding:10px;
  border-radius:8px;
  border:none;
}
button{
  background:var(--primary);
  color:white;
  cursor:pointer;
}
#preview{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}
.card{
  width:150px;
  background:var(--card);
  padding:10px;
  border-radius:10px;
}
.card img{max-width:100%;border-radius:8px}
small{color:var(--muted)}
</style>
</head>

<body>
<div class="container">

<h1>Image Converter Pro</h1>
<p>WEBP • PNG • JPG • Compression • ZIP</p>

<div class="dropzone" id="dropzone">Glissez vos images ou cliquez</div>
<input type="file" id="upload" multiple accept="image/*" hidden>

<div class="controls">
<select id="mode">
<option value="jpg">Convertir en JPG</option>
<option value="png">Convertir en PNG</option>
<option value="webp">Convertir en WEBP</option>
<option value="compress">Compression JPG</option>
</select>

<label>Qualité
<select id="quality">
<option value="1">100%</option>
<option value="0.9" selected>90%</option>
<option value="0.8">80%</option>
<option value="0.6">60%</option>
</select>
</label>

<label>Largeur max
<input type="number" id="resize" placeholder="1200">
</label>

<button onclick="processImages()">Convertir</button>
<button onclick="downloadZip()">ZIP</button>
</div>

<div id="preview"></div>
</div>

<script>
const upload=document.getElementById('upload');
const dropzone=document.getElementById('dropzone');
const preview=document.getElementById('preview');
let files=[];
let converted=[];

function loadFiles(list){
  files=[...list];
  preview.innerHTML='';
  converted=[];

  files.forEach(file=>{
    const r=new FileReader();
    r.onload=e=>{
      const div=document.createElement('div');
      div.className='card';
      div.innerHTML=`<img src="${e.target.result}"><small>${file.name}</small>`;
      preview.appendChild(div);
    };
    r.readAsDataURL(file);
  });
}

upload.addEventListener('change',e=>loadFiles(e.target.files));
dropzone.onclick=()=>upload.click();
dropzone.addEventListener('dragover',e=>e.preventDefault());
dropzone.addEventListener('drop',e=>{e.preventDefault();loadFiles(e.dataTransfer.files);});

dropzone.addEventListener('click',()=>upload.click());

function processImages(){
  if(!files.length) return alert('Sélectionnez des images');

  converted=[];
  const mode=document.getElementById('mode').value;
  const quality=parseFloat(document.getElementById('quality').value);
  const maxWidth=parseInt(document.getElementById('resize').value);

  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.src=e.target.result;

      img.onload=()=>{
        let w=img.width,h=img.height;
        if(maxWidth && w>maxWidth){h=Math.round(h*(maxWidth/w));w=maxWidth;}

        const canvas=document.createElement('canvas');
        canvas.width=w;
        canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);

        let type='image/jpeg';
        let ext='.jpg';

        if(mode==='png'){type='image/png';ext='.png';}
        if(mode==='webp'){type='image/webp';ext='.webp';}

        canvas.toBlob(blob=>{
          const name=file.name.replace(/\.[^.]+$/,'')+ext;
          converted.push({name,blob});

          const a=document.createElement('a');
          a.href=URL.createObjectURL(blob);
          a.download=name;
          a.click();
        },type,quality);
      };
    };
    reader.readAsDataURL(file);
  });
}

async function downloadZip(){
  if(!converted.length) return alert('Convertissez d’abord');
  const zip=new JSZip();
  converted.forEach(f=>zip.file(f.name,f.blob));
  const blob=await zip.generateAsync({type:'blob'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='converted-images.zip';
  a.click();
}
</script>

</body>
</html>
