<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recadrage d’images en ligne gratuit | Image Tools Pro</title>

<meta name="description" content="Recadrez vos images en ligne gratuitement. Coupez et ajustez vos images facilement dans le navigateur. Outil rapide et sécurisé.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="style.css">

<style>
canvas {
  max-width: 100%;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

/* ligne largeur + hauteur */
.crop-row{
  display:flex;
  gap:10px;
}

.crop-row div{
  flex:1;
}
</style>

</head>

<body>

<header>
  <h1>Recadreur d’images</h1>
  <p>Recadrez vos images facilement en ligne</p>
</header>

<div class="container">

  <div class="box">

    <input type="file" id="file" accept="image/*">

    <div class="box">
      <p><b>Taille originale :</b> <span id="origSize">-</span> px</p>
    </div>

    <div class="box">

      <label>Dimensions du recadrage (px)</label>

      <div class="crop-row">
        <div>
          <input type="number" id="cropW" placeholder="Largeur (px)">
        </div>

        <div>
          <input type="number" id="cropH" placeholder="Hauteur (px)">
        </div>
      </div>

    </div>

    <button onclick="cropImage()">Recadrer l’image</button>

  </div>

  <div class="preview" id="preview"></div>

</div>

<script>

let img = new Image();

/* CHARGEMENT IMAGE */
document.getElementById("file").onchange = (e) => {
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = ev => {
    img.src = ev.target.result;

    img.onload = () => {

      // afficher taille originale en px
      document.getElementById("origSize").innerText =
        img.width + " x " + img.height;

      document.getElementById("preview").innerHTML = `
        <div class="box">
          <p>Image originale</p>
          <img src="${img.src}" alt="image originale">
        </div>
      `;
    };
  };

  reader.readAsDataURL(file);
};

/* RECADRAGE */
function cropImage(){

  if(!img.src){
    alert("Veuillez ajouter une image");
    return;
  }

  let w = parseInt(document.getElementById("cropW").value);
  let h = parseInt(document.getElementById("cropH").value);

  if(!w || !h){
    alert("Veuillez entrer largeur et hauteur en px");
    return;
  }

  let canvas = document.createElement("canvas");
  canvas.width = w;
  canvas.height = h;

  let ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0, w, h);

  canvas.toBlob(blob => {

    let url = URL.createObjectURL(blob);

    document.getElementById("preview").innerHTML += `
      <div class="box">

        <p>Image recadrée (${w}px × ${h}px)</p>

        <img src="${url}" alt="image recadrée">

        <br><br>

        <a href="${url}" download="image-recadree.jpg">
          <button>Télécharger</button>
        </a>

      </div>
    `;

  }, "image/jpeg");

}

</script>

<footer>
<p>© 2026 Image Tools Pro — Outils d’images gratuits en ligne</p>

</body>
</html>
