<body>

<header>
<h1>Image Cropper</h1>
<p>Crop images online instantly — free and secure tool</p>
</header>

<div class="container">

<div class="box">
<input type="file" id="file" accept="image/*">

<br><br>

<label>Start X</label><br>
<input type="number" id="sx" value="0">

<label>Start Y</label><br>
<input type="number" id="sy" value="0">

<label>Width</label><br>
<input type="number" id="sw">

<label>Height</label><br>
<input type="number" id="sh">

<br>

<button onclick="cropImage()">Crop Image</button>
</div>

<canvas id="canvas"></canvas>

<div class="preview" id="preview"></div>

</div>

<script>

let img = new Image();

/* LOAD IMAGE */
document.getElementById("file").onchange = (e) => {
const file = e.target.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = ev => {
img.src = ev.target.result;

img.onload = () => {

document.getElementById("sw").value = img.width;
document.getElementById("sh").value = img.height;

const canvas = document.getElementById("canvas");
canvas.width = img.width;
canvas.height = img.height;

canvas.getContext("2d").drawImage(img,0,0);

document.getElementById("preview").innerHTML = `
<div>
<p>Original Image</p>
<img src="${img.src}">
</div>
`;
};
};

reader.readAsDataURL(file);
};

/* CROP */
function cropImage(){

if(!img.src){
alert("Ajoute une image");
return;
}

let sx = parseInt(document.getElementById("sx").value);
let sy = parseInt(document.getElementById("sy").value);
let sw = parseInt(document.getElementById("sw").value);
let sh = parseInt(document.getElementById("sh").value);

if(!sw || !sh){
alert("Dimensions invalides");
return;
}

let canvas = document.createElement("canvas");
canvas.width = sw;
canvas.height = sh;

let ctx = canvas.getContext("2d");

ctx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);

canvas.toBlob(blob => {

let url = URL.createObjectURL(blob);

document.getElementById("preview").innerHTML = `
<div>
<p>Cropped Image</p>
<img src="${url}">
<br><br>
<a href="${url}" download="cropped.jpg">
<button>Download</button>
</a>
</div>
`;

}, "image/jpeg");

}

</script>
