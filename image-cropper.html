<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Cropper Online Free | Image Tools Pro</title>

<meta name="description" content="Crop images online for free. Cut, resize and adjust your images easily in browser. Fast and secure image crop tool.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="style.css">

<style>
/* ONLY crop UI extras */
canvas {
  max-width: 100%;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}
</style>

</head>

<body>

<header>
  <h1>Image Cropper</h1>
  <p>Crop your images easily online</p>
</header>

<div class="container">

  <div class="box">

    <input type="file" id="file" accept="image/*">

    <div class="box">
      <label>Crop Width</label><br>
      <input type="number" id="cropW" placeholder="Width">

      <label>Crop Height</label><br>
      <input type="number" id="cropH" placeholder="Height">
    </div>

    <button onclick="cropImage()">Crop Image</button>

  </div>

  <div class="preview" id="preview"></div>

</div>

<script>

let img = new Image();

/* LOAD IMAGE */
document.getElementById("file").onchange = (e) => {
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = ev => {
    img.src = ev.target.result;

    img.onload = () => {
      document.getElementById("preview").innerHTML = `
        <div class="box">
          <p>Original Image</p>
          <img src="${img.src}" alt="original image">
        </div>
      `;
    };
  };

  reader.readAsDataURL(file);
};

/* CROP FUNCTION */
function cropImage(){

  if(!img.src){
    alert("Add an image");
    return;
  }

  let w = parseInt(document.getElementById("cropW").value);
  let h = parseInt(document.getElementById("cropH").value);

  if(!w || !h){
    alert("Enter valid width and height");
    return;
  }

  let canvas = document.createElement("canvas");
  canvas.width = w;
  canvas.height = h;

  let ctx = canvas.getContext("2d");

  ctx.drawImage(img, 0, 0, w, h);

  canvas.toBlob(blob => {

    let url = URL.createObjectURL(blob);

    document.getElementById("preview").innerHTML += `
      <div class="box">

        <p>Cropped Image</p>

        <img src="${url}" alt="cropped image">

        <br><br>

        <a href="${url}" download="cropped.jpg">
          <button>Download</button>
        </a>

      </div>
    `;

  }, "image/jpeg");

}

</script>

</html>
