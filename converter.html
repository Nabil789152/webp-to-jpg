<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Convertisseur WebP | Image Tools Pro</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Convertisseur WebP</h1>
  <p>Convertir WebP en JPG ou PNG</p>
</header>

<div class="container">

  <div class="box">

    <input type="file" id="file" accept="image/webp">

    <p id="detected">Format détecté : -</p>

    <select id="format">
      <option value="image/jpeg">JPG</option>
      <option value="image/png">PNG</option>
    </select>

    <button onclick="convert()">Convertir</button>

  </div>

  <div class="preview" id="preview"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  let img = new Image();
  let originalFileName = "";

  const fileInput = document.getElementById("file");
  const detected = document.getElementById("detected");
  const preview = document.getElementById("preview");

  // =========================
  // LOAD IMAGE
  // =========================
  fileInput.addEventListener("change", (e) => {

    const file = e.target.files[0];
    if (!file) return;

    // nom sans extension
    originalFileName = file.name.replace(/\.[^/.]+$/, "");

    detected.innerText = "Format détecté : " + file.type;

    const reader = new FileReader();

    reader.onload = (ev) => {

      img = new Image();

      img.onload = () => {
        preview.innerHTML = `
          <div class="box">
            <p>Image originale</p>
            <img src="${img.src}" style="max-width:100%;border-radius:10px;">
          </div>
        `;
      };

      img.src = ev.target.result;
    };

    reader.readAsDataURL(file);
  });

  // =========================
  // CONVERT FUNCTION
  // =========================
  window.convert = function () {

    if (!img.src) {
      alert("Ajoute une image !");
      return;
    }

    const format = document.getElementById("format").value;

    const canvas = document.createElement("canvas");
    canvas.width = img.width;
    canvas.height = img.height;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0);

    canvas.toBlob((blob) => {

      if (!blob) {
        alert("Erreur de conversion");
        return;
      }

      const url = URL.createObjectURL(blob);

      const ext = format === "image/png" ? "png" : "jpg";

      preview.innerHTML = `
        <div class="box">
          <p>Image convertie</p>

          <img src="${url}" style="max-width:100%;border-radius:10px;">

          <br><br>

          <a href="${url}" download="${originalFileName}-converted.${ext}">
            <button>Télécharger</button>
          </a>
        </div>
      `;
    }, format, 0.92);
  };

});
</script>

</body>
</html>
