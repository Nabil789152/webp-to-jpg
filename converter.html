<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Convertisseur WebP en ligne gratuit | Image Tools Pro</title>

<meta name="description" content="Convertissez vos images WebP en JPG ou PNG gratuitement en ligne. Outil rapide, sécurisé et facile d'utilisation.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Convertisseur WebP</h1>
  <p>Convertir des images WebP en JPG ou PNG instantanément</p>
</header>

<div class="container">

  <div class="box">

    <input type="file" id="file" accept="image/webp">

    <div class="box">
      <p id="detected">Format détecté : -</p>
    </div>

    <select id="format">
      <option value="image/jpeg">JPG</option>
      <option value="image/png">PNG</option>
    </select>

    <button onclick="convert()">Convertir</button>

  </div>

  <div class="preview" id="preview"></div>

</div>

<script>

let img = new Image();

/* CHARGEMENT DE L'IMAGE */
document.getElementById("file").onchange = (e) => {

  const file = e.target.files[0];
  if(!file) return;

  if(file.type !== "image/webp"){
    alert("Seuls les fichiers WebP sont acceptés");
    return;
  }

  document.getElementById("detected").innerText = "Format détecté : WEBP";

  const reader = new FileReader();

  reader.onload = ev => {
    img.src = ev.target.result;

    img.onload = () => {
      document.getElementById("preview").innerHTML = `
        <div class="box">
          <p>Image originale (WEBP)</p>
          <img src="${img.src}" alt="image originale WebP">
        </div>
      `;
    };
  };

  reader.readAsDataURL(file);
};

/* CONVERSION */
function convert(){

  if(!img.src){
    alert("Veuillez ajouter une image WebP");
    return;
  }

  let format = document.getElementById("format").value;

  let canvas = document.createElement("canvas");
  canvas.width = img.width;
  canvas.height = img.height;

  canvas.getContext("2d").drawImage(img, 0, 0);

  canvas.toBlob(blob => {

    let url = URL.createObjectURL(blob);

    document.getElementById("preview").innerHTML = `
      <div class="box">

        <p>Image convertie</p>

        <img src="${url}" alt="image convertie">

        <br><br>

        <a href="${url}" download="image-convertie">
          <button>Télécharger</button>
        </a>

      </div>
    `;

  }, format);

}

</script>

</body>
</html>
