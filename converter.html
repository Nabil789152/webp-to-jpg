<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test Preview Fix</title>

<style>
body{background:#05070d;color:white;font-family:Arial;text-align:center}

.drop{
  border:2px dashed #00ffcc;
  padding:40px;
  margin:20px;
  cursor:pointer;
}

#preview{
  margin-top:20px;
}

#preview img{
  width:160px;
  border-radius:10px;
  border:1px solid #00ffcc;
}
</style>

</head>

<body>

<h2>TEST PREVIEW FIX</h2>

<div class="drop" id="drop">Clique ou glisse une image</div>

<input type="file" id="file" hidden accept="image/*">

<div id="preview"></div>

<script>

const file=document.getElementById("file");
const drop=document.getElementById("drop");
const preview=document.getElementById("preview");

/* CLICK OK */
drop.onclick=()=>file.click();

/* LOAD IMAGE */
file.onchange=(e)=>{
const f=e.target.files[0];

const reader=new FileReader();

reader.onload=(ev)=>{
console.log("IMAGE CHARGÉE"); // test

preview.innerHTML=""; // reset

const img=document.createElement("img");
img.src=ev.target.result;

preview.appendChild(img);
};

reader.readAsDataURL(f);
};

</script>

</body>
</html>
