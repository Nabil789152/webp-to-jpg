<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Neo Converter Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05070d;
  color:#e6fff9;
  text-align:center;
}

/* HEADER */
h2{
  margin-top:20px;
  color:#00ffcc;
}

/* DROPZONE */
.drop{
  border:2px dashed #00ffcc;
  padding:50px;
  margin:20px auto;
  width:80%;
  max-width:700px;
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
}

.drop:hover{
  background:rgba(0,255,204,0.05);
}

/* STATUS */
.status{
  margin-top:10px;
  color:#9fffe6;
}

/* CONTROLS */
.controls{
  margin:20px;
}

select,button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
}

button{
  background:linear-gradient(90deg,#00ffcc,#7c4dff);
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

/* PREVIEW GRID */
#preview{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:15px;
  max-width:900px;
  margin:20px auto;
  padding:10px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:12px;
  border:1px solid rgba(0,255,204,0.2);
}

.card img{
  width:100%;
  border-radius:8px;
}

small{
  display:block;
  margin-top:5px;
  color:#9fffe6;
}
</style>
</head>

<body>

<h2>NEO IMAGE CONVERTER PRO</h2>

<div id="drop" class="drop">
  📁 Clique ou glisse tes images ici
</div>

<div class="status" id="status">Aucune image chargée</div>

<input type="file" id="file" multiple hidden accept="image/*">

<div class="controls">
<select id="mode">
<option value="jpg">JPG</option>
<option value="png">PNG</option>
<option value="webp">WEBP</option>
</select>

<button onclick="convert()">Convertir</button>
</div>

<div id="preview"></div>

<script>

const file=document.getElementById("file");
const drop=document.getElementById("drop");
const preview=document.getElementById("preview");
const status=document.getElementById("status");

let files=[];

/* CLICK */
drop.onclick=()=>file.click();

/* DRAG */
drop.addEventListener("dragover",e=>{
e.preventDefault();
drop.style.borderColor="#7c4dff";
});

drop.addEventListener("dragleave",()=>{
drop.style.borderColor="#00ffcc";
});

drop.addEventListener("drop",e=>{
e.preventDefault();
load(e.dataTransfer.files);
});

/* INPUT */
file.onchange=e=>{
load(e.target.files);
};

function load(list){
files=[...list];
preview.innerHTML="";

status.innerText = files.length + " image(s) chargée(s) ✔";

files.forEach(f=>{
const reader=new FileReader();

reader.onload=e=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<img src="${e.target.result}">
<small>${f.name}</small>
`;
preview.appendChild(div);
};

reader.readAsDataURL(f);
});
}

/* CONVERT */
function convert(){

if(files.length===0){
alert("Ajoute des images");
return;
}

const mode=document.getElementById("mode").value;

files.forEach(f=>{
const reader=new FileReader();

reader.onload=e=>{
const img=new Image();
img.src=e.target.result;

img.onload=()=>{

const canvas=document.createElement("canvas");
canvas.width=img.width;
canvas.height=img.height;

canvas.getContext("2d").drawImage(img,0,0);

let type="image/jpeg";
let ext=".jpg";

if(mode==="png"){type="image/png";ext=".png";}
if(mode==="webp"){type="image/webp";ext=".webp";}

canvas.toBlob(blob=>{
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download=f.name.replace(/\.[^.]+$/,"")+ext;
a.click();
},type);

};

};

reader.readAsDataURL(f);
});

}

</script>

</body>
</html>
