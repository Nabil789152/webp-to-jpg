<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WebP to JPG Converter Free Online</title>

<meta name="description" content="Free online WebP to JPG and PNG converter. Convert WebP images instantly with fast and easy image conversion tools.">
<meta name="robots" content="index, follow">

<meta property="og:title" content="WebP to JPG Converter">
<meta property="og:description" content="Convert WebP images to JPG or PNG online for free. Fast and secure tool.">
<meta property="og:type" content="website">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05070d;
  color:#e6fff9;
  text-align:center;
}

h2{
  color:#00ffcc;
  margin-top:20px;
}

p{
  color:#9fffe6;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.box{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:12px;
  border:1px solid rgba(0,255,204,0.2);
  margin-top:15px;
}

input, select{
  margin-top:10px;
  padding:10px;
}

button{
  margin-top:15px;
  padding:12px 20px;
  background:linear-gradient(90deg,#00ffcc,#7c4dff);
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.preview img{
  max-width:250px;
  margin-top:15px;
  border-radius:10px;
  border:1px solid #00ffcc;
}

footer{
  margin-top:40px;
  padding:20px;
  color:#9fffe6;
  font-size:13px;
  border-top:1px solid rgba(255,255,255,0.1);
}
footer a{
  color:#00ffcc;
  text-decoration:none;
  margin:0 5px;
}
</style>

</head>

<body>

<h1>WebP to JPG Converter</h1>

<p>
Convert WebP images to JPG or PNG online for free. 
Fast, simple and secure image conversion tool.
</p>

<p>Convert WebP → JPG / PNG</p>

<div class="container">

<div class="box">

<input type="file" id="file" accept="image/webp">

<div class="box">
<p id="detected">Format détecté : -</p>
</div>

<select id="format">
<option value="image/jpeg">JPG</option>
<option value="image/png">PNG</option>
</select>

<button onclick="convert()">Convertir</button>

</div>

<!-- PREVIEW -->
<div class="preview" id="preview"></div>

</div>

<!-- FOOTER (CORRIGÉ) -->
<footer>
<a href="privacy.html">Privacy Policy</a> |
<a href="contact.html">Contact</a> |
<a href="about.html">About</a>
</footer>

<script>

let img = new Image();

/* LOAD IMAGE + DETECTION */
document.getElementById("file").onchange = (e) => {
const file = e.target.files[0];
if (!file) return;

if (file.type !== "image/webp") {
alert("Seuls les fichiers WebP sont autorisés");
return;
}

document.getElementById("detected").innerText = "Format détecté : WEBP";

const reader = new FileReader();

reader.onload = ev => {
img.src = ev.target.result;

img.onload = () => {
document.getElementById("preview").innerHTML = `
<div>
<p>Image originale (WEBP)</p>
<img src="${img.src}">
</div>
`;
};
};

reader.readAsDataURL(file);
};

/* CONVERT */
function convert(){

if(!img.src){
alert("Ajoute une image WebP");
return;
}

let format = document.getElementById("format").value;

let canvas = document.createElement("canvas");
canvas.width = img.width;
canvas.height = img.height;

canvas.getContext("2d").drawImage(img,0,0);

canvas.toBlob(blob => {

let url = URL.createObjectURL(blob);

document.getElementById("preview").innerHTML = `
<div>
<p>Image convertie</p>
<img src="${url}">
<br><br>
<a href="${url}" download="converted">
<button>Télécharger</button>
</a>
</div>
`;

}, format);

}

</script>

</body>
</html>
