<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WebP Converter | Image Tools Pro</title>

<meta name="description" content="Convert WebP images to JPG or PNG online for free. Fast and secure tool.">
<meta name="robots" content="index, follow">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05070d;
  color:#e6fff9;
  text-align:center;
}

/* HEADER */
header{
  padding:25px 15px;
}

h1{
  color:#00ffcc;
  margin:0;
}

p{
  color:#9fffe6;
}

/* CONTAINER */
.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

/* BOX */
.box{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:12px;
  border:1px solid rgba(0,255,204,0.2);
  margin-top:15px;
}

/* INPUTS */
input, select{
  margin-top:10px;
  padding:10px;
  width:80%;
  max-width:300px;
}

/* BUTTON (UNIFORME SITE) */
button{
  margin-top:15px;
  padding:12px 20px;
  background:linear-gradient(90deg,#00ffcc,#7c4dff);
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  color:#000;
}

/* PREVIEW */
.preview img{
  max-width:250px;
  margin-top:15px;
  border-radius:10px;
  border:1px solid #00ffcc;
}

/* FOOTER UNIFORME */
footer{
  margin-top:40px;
  padding:25px 20px;
  background:#0b0f19;
  border-top:1px solid rgba(255,255,255,0.08);
  text-align:center;
  font-family:Arial;
}

footer a{
  color:#00ffcc;
  text-decoration:none;
  margin:0 8px;
  font-size:14px;
}
</style>

</head>

<body>

<header>
  <h1>WebP Converter</h1>
  <p>Convert WebP images to JPG or PNG instantly</p>
</header>

<div class="container">

<div class="box">

<input type="file" id="file" accept="image/webp">

<p id="detected">Format détecté : -</p>

<select id="format">
<option value="image/jpeg">JPG</option>
<option value="image/png">PNG</option>
</select>

<button onclick="convert()">Convertir</button>

</div>

<div class="preview" id="preview"></div>

</div>

<script>

let img = new Image();

/* LOAD */
document.getElementById("file").onchange = (e) => {
const file = e.target.files[0];
if(!file) return;

if(file.type !== "image/webp"){
alert("Seuls les fichiers WebP sont autorisés");
return;
}

document.getElementById("detected").innerText = "Format détecté : WEBP";

const reader = new FileReader();

reader.onload = ev => {
img.src = ev.target.result;

img.onload = () => {
document.getElementById("preview").innerHTML = `
<div>
<p>Image originale</p>
<img src="${img.src}">
</div>
`;
};
};

reader.readAsDataURL(file);
};

/* CONVERT */
function convert(){

if(!img.src){
alert("Ajoute une image WebP");
return;
}

let format = document.getElementById("format").value;

let canvas = document.createElement("canvas");
canvas.width = img.width;
canvas.height = img.height;

canvas.getContext("2d").drawImage(img,0,0);

canvas.toBlob(blob => {

let url = URL.createObjectURL(blob);

document.getElementById("preview").innerHTML = `
<div>
<p>Image convertie</p>
<img src="${url}">
<br><br>
<a href="${url}" download="converted">
<button>Télécharger</button>
</a>
</div>
`;

}, format);

}

</script>

<footer>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="privacy.html">Privacy</a>
</footer>

</body>
</html>
