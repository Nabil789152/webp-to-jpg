<script>

let img = new Image();
let originalFileName = "";

/* CHARGEMENT DE L'IMAGE */
document.getElementById("file").onchange = (e) => {

  const file = e.target.files[0];
  if (!file) return;

  if (file.type !== "image/webp") {
    alert("Seuls les fichiers WebP sont acceptés");
    return;
  }

  // 👉 nom propre sans extension
  originalFileName = file.name.replace(/\.[^/.]+$/, "");

  document.getElementById("detected").innerText = "Format détecté : WEBP";

  const reader = new FileReader();

  reader.onload = ev => {
    img.src = ev.target.result;

    img.onload = () => {
      document.getElementById("preview").innerHTML = `
        <div class="box">
          <p>Image originale (WEBP)</p>
          <img src="${img.src}" alt="image originale WebP">
        </div>
      `;
    };
  };

  reader.readAsDataURL(file);
};

/* CONVERSION */
function convert() {

  if (!img.src) {
    alert("Veuillez ajouter une image WebP");
    return;
  }

  let format = document.getElementById("format").value;

  let canvas = document.createElement("canvas");
  canvas.width = img.width;
  canvas.height = img.height;

  let ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0);

  canvas.toBlob(blob => {

    if (!blob) {
      alert("Erreur de conversion");
      return;
    }

    let url = URL.createObjectURL(blob);

    // 👉 extension propre
    let ext = format === "image/png" ? "png" : "jpg";

    document.getElementById("preview").innerHTML = `
      <div class="box">

        <p>Image convertie</p>

        <img src="${url}" alt="image convertie">

        <br><br>

        <a href="${url}" download="${originalFileName}-converted.${ext}">
          <button>Télécharger</button>
        </a>

      </div>
    `;

  }, format, 0.92);

}

</script>
