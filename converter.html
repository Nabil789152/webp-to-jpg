<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Converter Fix</title>
<style>
body{background:#05070d;color:white;text-align:center;font-family:Arial}
.drop{border:2px dashed #00ffcc;padding:40px;margin:20px;cursor:pointer}
</style>
</head>

<body>

<h2>Image Converter (FIX)</h2>

<div class="drop" id="drop">Clique ou glisse une image</div>
<input type="file" id="file" accept="image/*" hidden>

<select id="mode">
<option value="jpg">JPG</option>
<option value="png">PNG</option>
<option value="webp">WEBP</option>
</select>

<button onclick="convert()">Convertir</button>

<script>
const file=document.getElementById("file");
const drop=document.getElementById("drop");

drop.onclick=()=>file.click();

file.onchange=e=>load(e.target.files);

function load(f){
const file=f[0];
const reader=new FileReader();

reader.onload=e=>{
const img=new Image();
img.src=e.target.result;

img.onload=()=>{
const canvas=document.createElement("canvas");
canvas.width=img.width;
canvas.height=img.height;
canvas.getContext("2d").drawImage(img,0,0);

let mode=document.getElementById("mode").value;
let type="image/jpeg";
let ext=".jpg";

if(mode==="png"){type="image/png";ext=".png";}
if(mode==="webp"){type="image/webp";ext=".webp";}

canvas.toBlob(blob=>{
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="converted"+ext;
a.click();
},type);
};
};

reader.readAsDataURL(file);
}
</script>

</body>
</html>
