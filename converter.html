<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WebP Converter Online Free | Image Tools Pro</title>

<meta name="description" content="Convert WebP images to JPG or PNG online for free. Fast, secure and easy image conversion tool.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>WebP Converter</h1>
  <p>Convert WebP images to JPG or PNG instantly</p>
</header>

<div class="container">

  <div class="box">

    <input type="file" id="file" accept="image/webp">

    <div class="box">
      <p id="detected">Format détecté : -</p>
    </div>

    <select id="format">
      <option value="image/jpeg">JPG</option>
      <option value="image/png">PNG</option>
    </select>

    <button onclick="convert()">Convert</button>

  </div>

  <div class="preview" id="preview"></div>

</div>

<script>

let img = new Image();

/* LOAD IMAGE */
document.getElementById("file").onchange = (e) => {

  const file = e.target.files[0];
  if(!file) return;

  if(file.type !== "image/webp"){
    alert("Only WebP files are allowed");
    return;
  }

  document.getElementById("detected").innerText = "Format détecté : WEBP";

  const reader = new FileReader();

  reader.onload = ev => {
    img.src = ev.target.result;

    img.onload = () => {
      document.getElementById("preview").innerHTML = `
        <div class="box">
          <p>Original Image (WEBP)</p>
          <img src="${img.src}" alt="original image">
        </div>
      `;
    };
  };

  reader.readAsDataURL(file);
};

/* CONVERT */
function convert(){

  if(!img.src){
    alert("Add a WebP image");
    return;
  }

  let format = document.getElementById("format").value;

  let canvas = document.createElement("canvas");
  canvas.width = img.width;
  canvas.height = img.height;

  canvas.getContext("2d").drawImage(img, 0, 0);

  canvas.toBlob(blob => {

    let url = URL.createObjectURL(blob);

    document.getElementById("preview").innerHTML = `
      <div class="box">

        <p>Converted Image</p>

        <img src="${url}" alt="converted image">

        <br><br>

        <a href="${url}" download="converted">
          <button>Download</button>
        </a>

      </div>
    `;

  }, format);

}

</script>

</html>
