<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>WebP Converter</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05070d;
  color:#e6fff9;
  text-align:center;
}

h2{
  color:#00ffcc;
  margin-top:20px;
}

p{
  color:#9fffe6;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.box{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:12px;
  border:1px solid rgba(0,255,204,0.2);
  margin-top:15px;
}

input, select{
  margin-top:10px;
  padding:10px;
}

button{
  margin-top:15px;
  padding:12px 20px;
  background:linear-gradient(90deg,#00ffcc,#7c4dff);
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.preview img{
  max-width:250px;
  margin-top:15px;
  border-radius:10px;
  border:1px solid #00ffcc;
}
</style>
</head>

<body>

<h2>WebP Converter</h2>
<p>Convert WebP → JPG / PNG</p>

<div class="container">

<div class="box">

<input type="file" id="file" accept="image/webp">

<div class="box">
<p id="detected">Format détecté : -</p>
</div>

<select id="format">
<option value="image/jpeg">JPG</option>
<option value="image/png">PNG</option>
</select>

<button onclick="convert()">Convertir</button>

</div>

<div class="preview" id="preview"></div>

</div>

<script>

let img=new Image();

/* DETECTION SIMPLE */
document.getElementById("file").onchange=(e)=>{
const file=e.target.files[0];
if(!file) return;

if(file.type!=="image/webp"){
alert("Seuls les fichiers WEBP sont autorisés");
return;
}

document.getElementById("detected").innerText="Format détecté : WEBP";

const reader=new FileReader();

reader.onload=ev=>{
img.src=ev.target.result;

img.onload=()=>{
document.getElementById("preview").innerHTML=`
<div>
<p>Image WebP originale</p>
<img src="${img.src}">
</div>
`;
};
};

reader.readAsDataURL(file);
};

/* CONVERT */
function convert(){

if(!img.src){
alert("Ajoute une image WebP");
return;
}

let format=document.getElementById("format").value;

let canvas=document.createElement("canvas");
canvas.width=img.width;
canvas.height=img.height;

canvas.getContext("2d").drawImage(img,0,0);

canvas.toBlob(blob=>{

let url=URL.createObjectURL(blob);

document.getElementById("preview").innerHTML+=`
<div>
<p>Image convertie</p>
<img src="${url}">
<br><br>
<a href="${url}" download="converted">
<button>Télécharger</button>
</a>
</div>
`;

},format);

}

</script>

</body>
</html>
