<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compresseur d’images PRO | Image Tools Pro</title>

<style>

body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f4f6f9;
}

header{
  text-align:center;
  padding:25px;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:14px;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.drop-zone{
  border:2px dashed #bbb;
  padding:40px;
  text-align:center;
  border-radius:12px;
  cursor:pointer;
  background:#fafafa;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#007bff;
  color:white;
  cursor:pointer;
}

button:hover{ background:#0056d2; }

.preview{
  margin-top:20px;
}

.box{
  background:#fff;
  padding:15px;
  margin-top:15px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 3px 12px rgba(0,0,0,0.08);
}

.box img{
  max-width:100%;
  border-radius:10px;
}

.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  margin-top:5px;
}

.low{ background:#d4edda; color:#155724; }
.medium{ background:#fff3cd; color:#856404; }
.high{ background:#f8d7da; color:#721c24; }

</style>
</head>

<body>

<header>
  <h1>🗜️ Compresseur d’images PRO</h1>
</header>

<div class="container">

<div class="card">

  <div class="drop-zone" id="dropZone">
    🖼️ Clique ou glisse ton image ici
    <input type="file" id="file" accept="image/*" hidden>
  </div>

  <label>Qualité</label>
  <input type="range" id="quality" min="10" max="100" value="70">
  <p id="qtext">Qualité : 70%</p>

  <button onclick="compressImage()">🚀 Compresser</button>

</div>

<div class="preview" id="preview"></div>

</div>

<script>

let img = new Image();
let originalSize = 0;
let originalFileName = "";

const fileInput = document.getElementById("file");
const dropZone = document.getElementById("dropZone");

dropZone.addEventListener("click", () => fileInput.click());

fileInput.addEventListener("change", e => handleFile(e.target.files[0]));

function handleFile(file){

  if(!file) return;

  originalSize = file.size / 1024;
  originalFileName = file.name.split(".")[0];

  const reader = new FileReader();

  reader.onload = e => {

    img.src = e.target.result;

    img.onload = () => {

      document.getElementById("preview").innerHTML = `
        <div class="box">
          <h3>Image originale</h3>
          <img src="${img.src}">
          <p>${originalSize.toFixed(2)} KB</p>
          <p>${img.width} × ${img.height}px</p>
        </div>
      `;
    };
  };

  reader.readAsDataURL(file);
}

document.getElementById("quality").addEventListener("input", e => {
  document.getElementById("qtext").innerText =
  "Qualité : " + e.target.value + "%";
});

function getCompressionLevel(q){

  if(q >= 80) return {text:"Compression légère", class:"low"};
  if(q >= 50) return {text:"Compression moyenne", class:"medium"};
  return {text:"Compression forte", class:"high"};
}

function compressImage(){

  if(!img.src){
    alert("Ajoute une image !");
    return;
  }

  let quality = document.getElementById("quality").value / 100;

  let canvas = document.createElement("canvas");
  let ctx = canvas.getContext("2d");

  canvas.width = img.width;
  canvas.height = img.height;

  ctx.drawImage(img, 0, 0);

  canvas.toBlob(blob => {

    let url = URL.createObjectURL(blob);
    let newSize = blob.size / 1024;

    let reduction = (100 - (newSize / originalSize * 100)).toFixed(1);

    let level = getCompressionLevel(document.getElementById("quality").value);

    document.getElementById("preview").innerHTML += `
      <div class="box">

        <h3>Image compressée</h3>

        <img src="${url}">

        <p>Taille : ${newSize.toFixed(2)} KB</p>
        <p>Réduction : ${reduction}%</p>

        <p>Qualité JPEG : ${document.getElementById("quality").value}%</p>

        <span class="badge ${level.class}">
          ${level.text}
        </span>

        <p>${img.width} × ${img.height}px</p>

        <a href="${url}" download="${originalFileName}-compressed.jpg">
          <button>Télécharger</button>
        </a>

      </div>
    `;

  }, "image/jpeg", quality);
}

</script>

</body>
</html>
