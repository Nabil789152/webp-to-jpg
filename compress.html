<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compresseur d’images en ligne gratuit | Image Tools Pro</title>

<meta name="description" content="Compressez vos images en ligne gratuitement. Réduisez la taille des images instantanément tout en gardant une bonne qualité. Outil rapide et sécurisé.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Compresseur d’images</h1>
  <p>Réduire la taille des images sans perte de qualité</p>
</header>

<div class="container">

  <div class="box">

    <input type="file" id="file" accept="image/*">

    <div class="box">
      <label>Qualité de compression</label><br>
      <input type="range" id="quality" min="10" max="100" value="70">
      <br>
      <small id="qtext">Qualité : 70%</small>
    </div>

    <button onclick="compress()">Compresser l’image</button>

  </div>

  <div class="preview" id="preview"></div>

</div>

<script>

let img = new Image();
let originalSize = 0;

/* SLIDER QUALITÉ */
document.getElementById("quality").oninput = (e) => {
  document.getElementById("qtext").innerText = "Qualité : " + e.target.value + "%";
};

/* CHARGEMENT IMAGE */
document.getElementById("file").onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;

  originalSize = (file.size / 1024).toFixed(2);

  const reader = new FileReader();

  reader.onload = ev => {
    img.src = ev.target.result;

    img.onload = () => {
      document.getElementById("preview").innerHTML = `
        <div class="box">
          <p>Image originale (${originalSize} KB)</p>
          <img src="${img.src}" alt="image originale">
        </div>
      `;
    };
  };

  reader.readAsDataURL(file);
};

/* COMPRESSION */
function compress(){

  if(!img.src){
    alert("Veuillez ajouter une image");
    return;
  }

  let q = document.getElementById("quality").value / 100;

  let canvas = document.createElement("canvas");
  canvas.width = img.width;
  canvas.height = img.height;

  canvas.getContext("2d").drawImage(img, 0, 0);

  canvas.toBlob(blob => {

    let newSize = (blob.size / 1024).toFixed(2);
    let reduction = (100 - (newSize / originalSize * 100)).toFixed(1);

    let url = URL.createObjectURL(blob);

    document.getElementById("preview").innerHTML += `
      <div class="box">

        <p>Image compressée</p>

        <img src="${url}" alt="image compressée">

        <p>Taille : ${newSize} KB</p>
        <p>Réduction : ${reduction}%</p>

        <a href="${url}" download="image-compressee.jpg">
          <button>Télécharger</button>
        </a>

      </div>
    `;

  }, "image/jpeg", q);

}

</script>

</body>
</html>
