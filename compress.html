<body>

<h1>Compress Image Online</h1>
<p>Reduce image file size instantly while keeping good quality.</p>

<div class="container">

<input type="file" id="file" accept="image/*">

<div class="box">
<label>Qualité de compression</label><br>
<input type="range" id="quality" min="10" max="100" value="70">
<br>
<small id="qtext">Qualité : 70%</small>
</div>

<button onclick="compress()">Compresser</button>

<div class="preview" id="preview"></div>

</div>


<script>

let img = new Image();
let originalSize = 0;

/* SLIDER */
document.getElementById("quality").oninput = (e) => {
document.getElementById("qtext").innerText = "Qualité : " + e.target.value + "%";
};

/* LOAD IMAGE */
document.getElementById("file").onchange = (e) => {

const file = e.target.files[0];
if(!file) return;

originalSize = (file.size / 1024).toFixed(2);

const reader = new FileReader();

reader.onload = ev => {
img.src = ev.target.result;

img.onload = () => {
document.getElementById("preview").innerHTML = `
<div>
<p class="info">Image originale (${originalSize} KB)</p>
<img src="${img.src}" alt="Original image">
</div>
`;
};
};

reader.readAsDataURL(file);
};

/* COMPRESS */
function compress(){

if(!img.src){
alert("Ajoute une image");
return;
}

let q = document.getElementById("quality").value / 100;

let canvas = document.createElement("canvas");
canvas.width = img.width;
canvas.height = img.height;

canvas.getContext("2d").drawImage(img,0,0);

canvas.toBlob(blob => {

let newSize = (blob.size / 1024).toFixed(2);
let reduction = (100 - (newSize / originalSize * 100)).toFixed(1);

let url = URL.createObjectURL(blob);

/* IMPORTANT: replace content */
document.getElementById("preview").innerHTML = `
<div>

<p class="info">Image compressée</p>

<img src="${url}" alt="Compressed image">

<p class="info">Taille : ${newSize} KB</p>
<p class="info">Réduction : ${reduction}%</p>

<a href="${url}" download="compressed.jpg">
<button>Télécharger</button>
</a>

</div>
`;

},"image/jpeg",q);

}

</script>
