<script>

let img = new Image();
let originalSize = 0;
let originalFileName = "";

/* SLIDER QUALITÉ */
document.getElementById("quality").addEventListener("input", (e) => {
  document.getElementById("qtext").innerText =
    "Qualité : " + e.target.value + "%";
});

/* DROP + CLICK ZONE (si tu l’ajoutes dans HTML) */
const fileInput = document.getElementById("file");
const dropZone = document.getElementById("dropZone");

/* CLICK */
if (dropZone) {
  dropZone.addEventListener("click", () => fileInput.click());

  /* DRAG OVER */
  dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.classList.add("dragover");
  });

  /* DRAG LEAVE */
  dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
  });

  /* DROP */
  dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("dragover");

    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });
}

/* FILE INPUT */
fileInput.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (file) handleFile(file);
});

/* HANDLE FILE (centralisé propre) */
function handleFile(file) {

  if (!file) return;

  if (!file.type.startsWith("image/")) {
    alert("Veuillez choisir une image !");
    return;
  }

  originalSize = file.size / 1024;
  originalFileName = file.name.replace(/\.[^/.]+$/, "");

  const reader = new FileReader();

  reader.onload = ev => {
    img.src = ev.target.result;

    img.onload = () => {

      document.getElementById("imgSize").innerText =
        img.width + " × " + img.height + " px";

      document.getElementById("preview").innerHTML = `
        <div class="box">
          <p>Image originale (${originalSize.toFixed(2)} KB)</p>
          <img src="${img.src}" alt="image originale"
               style="max-width:100%;border-radius:10px;">
        </div>
      `;
    };
  };

  reader.readAsDataURL(file);
}

/* COMPRESSION */
function compress() {

  if (!img.src) {
    alert("Veuillez ajouter une image");
    return;
  }

  let q = document.getElementById("quality").value / 100;

  let canvas = document.createElement("canvas");
  canvas.width = img.width;
  canvas.height = img.height;

  let ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0);

  canvas.toBlob(blob => {

    if (!blob) {
      alert("Erreur de compression");
      return;
    }

    let newSize = blob.size / 1024;
    let reduction = (100 - (newSize / originalSize * 100)).toFixed(1);

    let url = URL.createObjectURL(blob);

    document.getElementById("preview").innerHTML += `
      <div class="box">

        <p>Image compressée</p>

        <img src="${url}" alt="image compressée"
             style="max-width:100%;border-radius:10px;">

        <p>Taille : ${newSize.toFixed(2)} KB</p>
        <p>Réduction : ${reduction}%</p>

        <a href="${url}" download="${originalFileName}-compressed.jpg">
          <button>Télécharger</button>
        </a>

      </div>
    `;

  }, "image/jpeg", q);

}

</script>
