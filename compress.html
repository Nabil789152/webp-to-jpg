<script>
document.addEventListener("DOMContentLoaded", () => {

let img = new Image();
let originalFileName = "";

const fileInput = document.getElementById("file");
const dropZone = document.querySelector(".box");
const preview = document.getElementById("preview");
const detected = document.getElementById("detected");

/* =========================
   FILE + DRAG & DROP
========================= */

function handleFile(file) {
  if (!file) return;

  if (file.type !== "image/webp") {
    alert("Seuls les fichiers WebP sont acceptés");
    return;
  }

  originalFileName = file.name.replace(/\.[^/.]+$/, "");

  detected.innerText = "Format détecté : WEBP";

  const reader = new FileReader();

  reader.onload = ev => {
    img.src = ev.target.result;

    img.onload = () => {
      preview.innerHTML = `
        <div class="box">
          <p>Image originale (WEBP)</p>
          <img src="${img.src}" style="max-width:100%;border-radius:10px;">
        </div>
      `;
    };
  };

  reader.readAsDataURL(file);
}

/* FILE INPUT */
fileInput.addEventListener("change", (e) => {
  handleFile(e.target.files[0]);
});

/* DRAG ENTER */
dropZone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropZone.classList.add("drag-active");
});

dropZone.addEventListener("dragleave", () => {
  dropZone.classList.remove("drag-active");
});

/* DROP */
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("drag-active");

  handleFile(e.dataTransfer.files[0]);
});

/* =========================
   CONVERT
========================= */

window.convert = function () {

  if (!img.src) {
    alert("Ajoute une image !");
    return;
  }

  let format = document.getElementById("format").value;

  let canvas = document.createElement("canvas");
  canvas.width = img.width;
  canvas.height = img.height;

  let ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0);

  canvas.toBlob(blob => {

    let url = URL.createObjectURL(blob);
    let ext = format === "image/png" ? "png" : "jpg";

    preview.innerHTML += `
      <div class="box">
        <p>Image convertie</p>
        <img src="${url}" style="max-width:100%;border-radius:10px;">
        <br><br>
        <a href="${url}" download="${originalFileName}-converted.${ext}">
          <button>Télécharger</button>
        </a>
      </div>
    `;

  }, format);

};

});
</script>
