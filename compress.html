<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compresseur d’images | Image Tools Pro</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Compresser une image</h1>
  <p>Réduire la taille sans perte visible de qualité</p>
</header>

<div class="container">

  <div class="box">

    <input type="file" id="file" accept="image/*">

    <br><br>

    <label>Qualité</label>
    <input type="range" id="quality" min="10" max="100" value="70">

    <p id="qtext">Qualité : 70%</p>

    <br>

    <small>Taille originale : <span id="imgSize">-</span></small>

    <br><br>

    <button onclick="compress()">Compresser</button>

  </div>

  <div class="preview" id="preview"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  let img = new Image();
  let originalSize = 0;
  let originalFileName = "";

  const fileInput = document.getElementById("file");
  const qualityInput = document.getElementById("quality");
  const qtext = document.getElementById("qtext");
  const imgSize = document.getElementById("imgSize");
  const preview = document.getElementById("preview");

  // =========================
  // SLIDER
  // =========================
  qualityInput.addEventListener("input", (e) => {
    qtext.textContent = "Qualité : " + e.target.value + "%";
  });

  // =========================
  // LOAD IMAGE
  // =========================
  fileInput.addEventListener("change", (e) => {

    const file = e.target.files[0];
    if (!file) return;

    originalSize = file.size / 1024;
    originalFileName = file.name.replace(/\.[^/.]+$/, "");

    const reader = new FileReader();

    reader.onload = (ev) => {

      img = new Image();

      img.onload = () => {

        imgSize.textContent = img.width + " × " + img.height + " px";

        preview.innerHTML = `
          <div class="box">
            <p>Image originale (${originalSize.toFixed(2)} KB)</p>
            <img src="${img.src}" style="max-width:100%;border-radius:10px;">
          </div>
        `;
      };

      img.src = ev.target.result;
    };

    reader.readAsDataURL(file);
  });

  // =========================
  // COMPRESS FUNCTION
  // =========================
  window.compress = function () {

    if (!img.src) {
      alert("Ajoute une image !");
      return;
    }

    const q = qualityInput.value / 100;

    const canvas = document.createElement("canvas");
    canvas.width = img.width;
    canvas.height = img.height;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0);

    canvas.toBlob((blob) => {

      if (!blob) {
        alert("Erreur de compression");
        return;
      }

      const newSize = blob.size / 1024;
      const reduction = (100 - (newSize / originalSize * 100)).toFixed(1);

      const url = URL.createObjectURL(blob);

      preview.innerHTML += `
        <div class="box">

          <p>Image compressée</p>

          <img src="${url}" style="max-width:100%;border-radius:10px;">

          <p>Taille : ${newSize.toFixed(2)} KB</p>
          <p>Réduction : ${reduction}%</p>

          <a href="${url}" download="${originalFileName}-compressed.jpg">
            <button>Télécharger</button>
          </a>

        </div>
      `;

    }, "image/jpeg", q);
  };

});
</script>

</body>
</html>
