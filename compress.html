<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compresseur d’images</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f6f9;
}

/* HEADER */
header{
    background:#1e88e5;
    color:white;
    padding:20px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:24px;
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* INPUT FILE */
input[type="file"]{
    width:100%;
    margin-bottom:15px;
}

/* QUALITY SLIDER */
label{
    font-weight:bold;
    display:block;
    margin-top:15px;
}

input[type="range"]{
    width:100%;
}

/* BUTTON */
button{
    margin-top:20px;
    width:100%;
    padding:12px;
    background:#1e88e5;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1565c0;
}

/* INFO */
.info{
    margin-top:10px;
    font-size:14px;
    color:#555;
}

/* PREVIEW */
.preview{
    margin-top:20px;
    text-align:center;
}

.preview img{
    max-width:100%;
    border-radius:10px;
    margin-top:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    margin-top:40px;
    background:#222;
    color:#aaa;
}
</style>
</head>

<body>

<header>
    <h1>Compresseur d’Images</h1>
</header>

<div class="container">

    <input type="file" id="imageInput" accept="image/*">

    <label>Qualité de compression (JPEG)</label>
    <input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.7">
    <div class="info">Qualité actuelle : <span id="qValue">0.7</span></div>

    <button onclick="compressImage()">Compresser l’image</button>

    <div class="preview">
        <h3>Aperçu compressé :</h3>
        <img id="output">
    </div>

    <button id="downloadBtn" style="display:none;">Télécharger l’image compressée</button>

</div>

<footer>
    © 2026 - Outils Image Pro | Développé par Nabil
</footer>

<script>
let originalImage = new Image();

const qualitySlider = document.getElementById("quality");
const qValue = document.getElementById("qValue");

qualitySlider.addEventListener("input", function(){
    qValue.textContent = qualitySlider.value;
});

document.getElementById("imageInput").addEventListener("change", function(e){
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(event){
        originalImage.src = event.target.result;
    };
    reader.readAsDataURL(file);
});

function compressImage(){
    if(!originalImage.src){
        alert("Veuillez choisir une image !");
        return;
    }

    const quality = parseFloat(qualitySlider.value);

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = originalImage.width;
    canvas.height = originalImage.height;

    ctx.drawImage(originalImage, 0, 0);

    const compressedDataURL = canvas.toDataURL("image/jpeg", quality);

    document.getElementById("output").src = compressedDataURL;

    const downloadBtn = document.getElementById("downloadBtn");
    downloadBtn.style.display = "block";

    downloadBtn.onclick = function(){
        const a = document.createElement("a");
        a.href = compressedDataURL;
        a.download = "compressed-image.jpg";
        a.click();
    };
}
</script>

</body>
</html>
