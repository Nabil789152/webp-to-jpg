<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Compressor Online Free | Image Tools Pro</title>

<meta name="description" content="Compress images online for free. Reduce image size instantly while keeping high quality. Fast and secure image compressor tool.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Image Compressor</h1>
  <p>Reduce image size without losing quality</p>
</header>

<div class="container">

  <div class="box">

    <input type="file" id="file" accept="image/*">

    <div class="box">
      <label>Compression quality</label><br>
      <input type="range" id="quality" min="10" max="100" value="70">
      <br>
      <small id="qtext">Quality: 70%</small>
    </div>

    <button onclick="compress()">Compress Image</button>

  </div>

  <div class="preview" id="preview"></div>

</div>

<script>

let img = new Image();
let originalSize = 0;

/* QUALITY SLIDER */
document.getElementById("quality").oninput = (e) => {
  document.getElementById("qtext").innerText = "Quality: " + e.target.value + "%";
};

/* LOAD IMAGE */
document.getElementById("file").onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;

  originalSize = (file.size / 1024).toFixed(2);

  const reader = new FileReader();

  reader.onload = ev => {
    img.src = ev.target.result;

    img.onload = () => {
      document.getElementById("preview").innerHTML = `
        <div class="box">
          <p>Original Image (${originalSize} KB)</p>
          <img src="${img.src}" alt="original image">
        </div>
      `;
    };
  };

  reader.readAsDataURL(file);
};

/* COMPRESS */
function compress(){

  if(!img.src){
    alert("Please add an image");
    return;
  }

  let q = document.getElementById("quality").value / 100;

  let canvas = document.createElement("canvas");
  canvas.width = img.width;
  canvas.height = img.height;

  canvas.getContext("2d").drawImage(img, 0, 0);

  canvas.toBlob(blob => {

    let newSize = (blob.size / 1024).toFixed(2);
    let reduction = (100 - (newSize / originalSize * 100)).toFixed(1);

    let url = URL.createObjectURL(blob);

    document.getElementById("preview").innerHTML += `
      <div class="box">

        <p>Compressed Image</p>

        <img src="${url}" alt="compressed image">

        <p>Size: ${newSize} KB</p>
        <p>Reduction: ${reduction}%</p>

        <a href="${url}" download="compressed.jpg">
          <button>Download</button>
        </a>

      </div>
    `;

  }, "image/jpeg", q);

}

</script>

</html>
