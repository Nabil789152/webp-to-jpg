<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compresseur d’images | Image Tools Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Compresser une image</h1>
  <p>Glisse-dépose ou sélectionne une image</p>
</header>

<div class="container">

  <!-- DROP ZONE -->
  <div class="box" id="dropZone">

    <input type="file" id="file" accept="image/*">

    <br><br>

    <label>Qualité</label>
    <input type="range" id="quality" min="10" max="100" value="70">

    <small id="qtext">Qualité : 70%</small>

    <br><br>

    <small>Dimensions : <span id="imgSize">-</span></small>

    <br><br>

    <button onclick="compress()">Compresser</button>

  </div>

  <!-- PREVIEW -->
  <div class="preview" id="preview"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  let img = new Image();
  let originalSize = 0;
  let originalFileName = "";

  const fileInput = document.getElementById("file");
  const dropZone = document.getElementById("dropZone");

  /* =========================
     SLIDER
  ========================= */
  document.getElementById("quality").addEventListener("input", (e) => {
    document.getElementById("qtext").textContent =
      "Qualité : " + e.target.value + "%";
  });

  /* =========================
     LOAD FILE (COMMON)
  ========================= */
  function handleFile(file) {

    if (!file) return;

    originalSize = file.size / 1024;
    originalFileName = file.name.replace(/\.[^/.]+$/, "");

    const reader = new FileReader();

    reader.onload = ev => {
      img.src = ev.target.result;

      img.onload = () => {

        document.getElementById("imgSize").textContent =
          img.width + " × " + img.height + " px";

        document.getElementById("preview").innerHTML = `
          <div class="box">
            <p>Image originale (${originalSize.toFixed(2)} KB)</p>
            <img src="${img.src}" style="max-width:100%;border-radius:10px;">
          </div>
        `;
      };
    };

    reader.readAsDataURL(file);
  }

  /* =========================
     FILE INPUT
  ========================= */
  fileInput.addEventListener("change", (e) => {
    handleFile(e.target.files[0]);
  });

  /* =========================
     DRAG & DROP
  ========================= */
  dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.classList.add("drag-active");
  });

  dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("drag-active");
  });

  dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("drag-active");

    handleFile(e.dataTransfer.files[0]);
  });

  /* =========================
     COMPRESS FUNCTION
  ========================= */
  window.compress = function () {

    if (!img.src) {
      alert("Ajoute une image !");
      return;
    }

    let q = document.getElementById("quality").value / 100;

    let canvas = document.createElement("canvas");
    canvas.width = img.width;
    canvas.height = img.height;

    let ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0);

    canvas.toBlob(blob => {

      if (!blob) {
        alert("Erreur compression");
        return;
      }

      let newSize = blob.size / 1024;
      let reduction = (100 - (newSize / originalSize * 100)).toFixed(1);

      let url = URL.createObjectURL(blob);

      document.getElementById("preview").innerHTML += `
        <div class="box">
          <p>Image compressée</p>

          <img src="${url}" style="max-width:100%;border-radius:10px;">

          <p>Taille : ${newSize.toFixed(2)} KB</p>
          <p>Réduction : ${reduction}%</p>

          <a href="${url}" download="${originalFileName}-compressed.jpg">
            <button>Télécharger</button>
          </a>
        </div>
      `;

    }, "image/jpeg", q);
  };

});
</script>

</body>
</html>
