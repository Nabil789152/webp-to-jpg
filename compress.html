<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Compress Image Online Free</title>
<meta name="description" content="Compress images online for free. Reduce image size instantly while keeping high quality. Fast and easy image compressor tool.">
<style>
body{
  background:#05070d;
  color:#e6fff9;
  font-family:Arial;
  text-align:center;
  margin:0;
}

h2{
  color:#00ffcc;
  margin-top:20px;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.box{
  background:rgba(255,255,255,0.05);
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid rgba(0,255,204,0.2);
}

input[type="file"]{
  margin-top:10px;
}

input[type="range"]{
  width:80%;
}

small{
  color:#9fffe6;
}

button{
  margin-top:15px;
  padding:12px 20px;
  background:linear-gradient(90deg,#00ffcc,#7c4dff);
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

/* PREVIEW */
.preview{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  margin-top:20px;
}

.preview img{
  max-width:300px;
  border-radius:10px;
  border:1px solid #00ffcc;
}

.info{
  font-size:14px;
  color:#9fffe6;
  margin-top:5px;
}

</style>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">
</head>

<body>

<h1>Compress Image Online</h1>
<p>
Reduce image file size online for free while keeping good image quality.
Fast, secure and easy image compression tool.
</p>
<div class="container">

<input type="file" id="file" accept="image/*">

<div class="box">
<label>Qualité de compression</label><br>
<input type="range" id="quality" min="10" max="100" value="70">
<br>
<small id="qtext">Qualité : 70%</small>
</div>

<button onclick="compress()">Compresser</button>

<div class="preview" id="preview"></div>

</div>

<script>

let img=new Image();
let originalSize=0;

/* SLIDER TEXT */
document.getElementById("quality").oninput=(e)=>{
document.getElementById("qtext").innerText="Qualité : "+e.target.value+"%";
};

/* LOAD IMAGE */
document.getElementById("file").onchange=(e)=>{
const file=e.target.files[0];

originalSize=(file.size/1024).toFixed(2);

const reader=new FileReader();

reader.onload=ev=>{
img.src=ev.target.result;

img.onload=()=>{
document.getElementById("preview").innerHTML=`
<div>
<p class="info">Image originale (${originalSize} KB)</p>
<img src="${img.src}">
</div>
`;
};
};

reader.readAsDataURL(file);
};

/* COMPRESS */
function compress(){

if(!img.src){
alert("Ajoute une image");
return;
}

let q=document.getElementById("quality").value/100;

let canvas=document.createElement("canvas");
canvas.width=img.width;
canvas.height=img.height;

canvas.getContext("2d").drawImage(img,0,0);

canvas.toBlob(blob=>{

let newSize=(blob.size/1024).toFixed(2);
let reduction=(100-(newSize/originalSize*100)).toFixed(1);

let url=URL.createObjectURL(blob);

/* RESULT UI PRO */
document.getElementById("preview").innerHTML+=`
<div>

<p class="info">Image compressée</p>

<img src="${url}">

<p class="info">Taille : ${newSize} KB</p>
<p class="info">Réduction : ${reduction}%</p>

<a href="${url}" download="compressed.jpg">
<button>Télécharger</button>
</a>

</div>
`;

},"image/jpeg",q);

}

</script>

</body>
</html>
