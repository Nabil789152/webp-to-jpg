<script>
document.addEventListener("DOMContentLoaded", () => {

  let img = new Image();
  let originalFileName = "";

  const fileInput = document.getElementById("file");
  const sizeInfo = document.getElementById("sizeInfo");
  const preview = document.getElementById("preview");
  const newWidthInput = document.getElementById("newWidth");

  // zone drag & drop = la box principale
  const dropZone = fileInput.closest(".box");

  if (!fileInput || !preview || !dropZone) {
    console.error("❌ Elements HTML manquants");
    return;
  }

  /* =========================
     FILE HANDLER
  ========================= */
  function handleFile(file) {

    if (!file || !file.type.startsWith("image/")) {
      alert("Veuillez choisir une image valide !");
      return;
    }

    originalFileName = file.name.replace(/\.[^/.]+$/, "");

    const reader = new FileReader();

    reader.onload = (ev) => {
      img.src = ev.target.result;

      img.onload = () => {
        sizeInfo.textContent = `${img.width} × ${img.height} px`;

        preview.innerHTML = `
          <div class="box">
            <p>Image originale</p>
            <img src="${img.src}" style="max-width:100%;border-radius:10px;">
          </div>
        `;
      };
    };

    reader.readAsDataURL(file);
  }

  /* FILE INPUT */
  fileInput.addEventListener("change", (e) => {
    handleFile(e.target.files[0]);
  });

  /* =========================
     DRAG & DROP CANVA STYLE
  ========================= */

  dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.classList.add("drag-active");
  });

  dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("drag-active");
  });

  dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("drag-active");

    const file = e.dataTransfer.files[0];
    handleFile(file);
  });

  /* =========================
     RESIZE
  ========================= */
  window.resizeImage = function () {

    if (!img.src) {
      alert("Ajoute une image !");
      return;
    }

    const newW = parseInt(newWidthInput.value);

    if (!newW || newW <= 0) {
      alert("Largeur invalide !");
      return;
    }

    const ratio = img.height / img.width;
    const newH = Math.round(newW * ratio);

    const canvas = document.createElement("canvas");
    canvas.width = newW;
    canvas.height = newH;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, newW, newH);

    canvas.toBlob((blob) => {

      const url = URL.createObjectURL(blob);

      preview.innerHTML += `
        <div class="box">
          <p>Image redimensionnée</p>
          <img src="${url}" style="max-width:100%;border-radius:10px;">

          <br><br>

          <a href="${url}" download="${originalFileName}-resized.jpg">
            <button>Télécharger</button>
          </a>
        </div>
      `;

    }, "image/jpeg", 0.92);
  };

});
</script>
