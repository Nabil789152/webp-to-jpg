<body>

<h1>Resize Image Online</h1>

<p>
Resize images online for free by changing width and height in pixels.
Fast, secure and easy image resizing tool.
</p>

<div class="container">

<div class="box">

<input type="file" id="file" accept="image/*">

<div class="box">

<label>Current Width</label>
<input type="number" id="currentW" readonly>

<label>Current Height</label>
<input type="number" id="currentH" readonly>

<label>New Width</label>
<input type="number" id="newW">

</div>

<button onclick="resizeImage()">Resize Image</button>

</div>

<div class="preview" id="preview"></div>

</div>

<script>

let img = new Image();

/* LOAD IMAGE */
document.getElementById("file").onchange = (e) => {

const file = e.target.files[0];
if (!file) return;

const reader = new FileReader();

reader.onload = ev => {

img.src = ev.target.result;

img.onload = () => {

document.getElementById("currentW").value = img.width;
document.getElementById("currentH").value = img.height;

document.getElementById("preview").innerHTML = `
<div>
<p>Original Image</p>
<img src="${img.src}" alt="Original image">
</div>
`;

};

};

reader.readAsDataURL(file);

};

/* RESIZE IMAGE */
function resizeImage(){

if(!img.src){
alert("Add an image");
return;
}

let newW = parseInt(document.getElementById("newW").value);

if(!newW || newW <= 0){
alert("Enter a valid width");
return;
}

let ratio = img.height / img.width;
let newH = Math.round(newW * ratio);

let canvas = document.createElement("canvas");

canvas.width = newW;
canvas.height = newH;

canvas.getContext("2d").drawImage(img,0,0,newW,newH);

canvas.toBlob(blob => {

let url = URL.createObjectURL(blob);

document.getElementById("preview").innerHTML = `
<div>
<p>Resized Image</p>
<img src="${url}" alt="Resized image">

<br><br>

<a href="${url}" download="resized-image">
<button>Download</button>
</a>

</div>
`;

});

}

</script>
