<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Redimensionneur d’images | Image Tools Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Redimensionner une image</h1>
  <p>Glisse-dépose ou sélectionne une image</p>
</header>

<div class="container">

  <!-- DROP ZONE -->
  <div class="box" id="dropZone">

    <input type="file" id="file" accept="image/*">

    <br><br>

    <small>Taille : <span id="sizeInfo">-</span></small>

    <br><br>

    <input type="number" id="newWidth" placeholder="Largeur (px)">

    <br><br>

    <button onclick="resizeImage()">Redimensionner</button>

  </div>

  <!-- PREVIEW -->
  <div class="preview" id="preview"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

let img = new Image();
let originalFileName = "";

/* =========================
   ELEMENTS
========================= */
const fileInput = document.getElementById("file");
const dropZone = document.getElementById("dropZone");
const sizeInfo = document.getElementById("sizeInfo");
const preview = document.getElementById("preview");
const widthInput = document.getElementById("newWidth");

/* =========================
   LOAD FILE
========================= */
fileInput.addEventListener("change", handleFile);

function handleFile(fileObj) {

  const file = fileObj.target ? fileObj.target.files[0] : fileObj;
  if (!file) return;

  originalFileName = file.name.replace(/\.[^/.]+$/, "");

  const reader = new FileReader();

  reader.onload = ev => {
    img.src = ev.target.result;

    img.onload = () => {
      sizeInfo.innerText = img.width + " × " + img.height + " px";

      preview.innerHTML = `
        <div class="box">
          <p>Image originale</p>
          <img src="${img.src}" style="max-width:100%;border-radius:10px;">
        </div>
      `;
    };
  };

  reader.readAsDataURL(file);
}

/* =========================
   DRAG & DROP SAFE
========================= */
if (dropZone) {

  dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.classList.add("drag-active");
  });

  dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("drag-active");
  });

  dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("drag-active");

    const file = e.dataTransfer.files[0];
    if (!file) return;

    handleFile(file);
  });
}

/* =========================
   RESIZE FUNCTION
========================= */
window.resizeImage = function () {

  if (!img.src) {
    alert("Ajoute une image !");
    return;
  }

  let newW = parseInt(widthInput.value);

  if (!newW || newW <= 0) {
    alert("Largeur invalide !");
    return;
  }

  let ratio = img.height / img.width;
  let newH = Math.round(newW * ratio);

  let canvas = document.createElement("canvas");
  canvas.width = newW;
  canvas.height = newH;

  let ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0, newW, newH);

  canvas.toBlob(blob => {

    if (!blob) {
      alert("Erreur de conversion");
      return;
    }

    let url = URL.createObjectURL(blob);

    preview.innerHTML += `
      <div class="box">
        <p>Image redimensionnée</p>
        <img src="${url}" style="max-width:100%;border-radius:10px;">

        <br><br>

        <a href="${url}" download="${originalFileName}-resized.jpg">
          <button>Télécharger</button>
        </a>
      </div>
    `;

  }, "image/jpeg", 0.92);
};

});
</script>

</body>
</html>
