<script>
document.addEventListener("DOMContentLoaded", () => {

let img = new Image();
let originalFileName = "";

/* =========================
   FILE INPUT LOAD
========================= */
const fileInput = document.getElementById("file");

fileInput.addEventListener("change", (e) => {

  const file = e.target.files[0];
  if (!file) return;

  loadImage(file);
});

/* =========================
   DRAG & DROP
========================= */

const dropZone = document.querySelector(".box");

dropZone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropZone.style.border = "2px dashed #1a73e8";
  dropZone.style.background = "#eef5ff";
});

dropZone.addEventListener("dragleave", () => {
  dropZone.style.border = "none";
  dropZone.style.background = "white";
});

dropZone.addEventListener("drop", (e) => {
  e.preventDefault();

  dropZone.style.border = "none";
  dropZone.style.background = "white";

  const file = e.dataTransfer.files[0];
  if (!file) return;

  fileInput.files = e.dataTransfer.files;
  loadImage(file);
});

/* =========================
   LOAD IMAGE FUNCTION
========================= */
function loadImage(file) {

  originalFileName = file.name.replace(/\.[^/.]+$/, "");

  const reader = new FileReader();

  reader.onload = ev => {
    img.src = ev.target.result;

    img.onload = () => {
      document.getElementById("sizeInfo").innerText =
        img.width + " × " + img.height + " px";

      document.getElementById("preview").innerHTML = `
        <div class="box">
          <p>Image originale</p>
          <img src="${img.src}" style="max-width:100%;border-radius:10px;">
        </div>
      `;
    };
  };

  reader.readAsDataURL(file);
}

/* =========================
   RESIZE
========================= */
window.resizeImage = function () {

  if (!img.src) {
    alert("Ajoute une image !");
    return;
  }

  let newW = parseInt(document.getElementById("newWidth").value);

  if (!newW || newW <= 0) {
    alert("Largeur invalide !");
    return;
  }

  let ratio = img.height / img.width;
  let newH = Math.round(newW * ratio);

  let canvas = document.createElement("canvas");
  canvas.width = newW;
  canvas.height = newH;

  canvas.getContext("2d").drawImage(img, 0, 0, newW, newH);

  canvas.toBlob(blob => {

    let url = URL.createObjectURL(blob);

    document.getElementById("preview").innerHTML += `
      <div class="box">
        <p>Image redimensionnée</p>
        <img src="${url}" style="max-width:100%;border-radius:10px;">

        <br><br>

        <a href="${url}" download="${originalFileName}-resized.jpg">
          <button>Télécharger</button>
        </a>
      </div>
    `;

  }, "image/jpeg", 0.92);
};

});
</script>
