<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Redimensionner une image en ligne gratuit | Image Tools Pro</title>

<meta name="description" content="Redimensionnez vos images en ligne gratuitement. Changez les dimensions facilement tout en gardant une bonne qualité. Outil rapide et simple.">
<meta name="robots" content="index, follow">

<meta property="og:title" content="Redimensionner une image en ligne gratuit">
<meta property="og:description" content="Redimensionnez vos images rapidement et facilement en ligne gratuitement.">
<meta property="og:type" content="website">

<link rel="stylesheet" href="style.css">

<style>
.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.preview img{
  max-width:260px;
  margin-top:15px;
  border-radius:10px;
  border:1px solid #ddd;
}

.small{
  font-size:13px;
  color:#5f6368;
}
</style>

</head>

<body>

<!-- HEADER -->
<header>
  <h1>Redimensionner une image</h1>
  <p>Changer les dimensions d’une image facilement en ligne</p>
</header>

<!-- MAIN -->
<div class="container">

<div class="box">

<input type="file" id="file" accept="image/*">

<div class="box">
<p class="small">
Taille originale : <span id="sizeInfo">-</span>
</p>
</div>

<label>Nouvelle largeur (px)</label><br>
<input type="number" id="newWidth" placeholder="ex : 800">

<br><br>

<button onclick="resizeImage()">Redimensionner</button>

</div>

<!-- PREVIEW -->
<div class="preview" id="preview"></div>

</div>

<script>

let img = new Image();

/* CHARGEMENT IMAGE */
document.getElementById("file").onchange = (e) => {
const file = e.target.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = ev => {
img.src = ev.target.result;

img.onload = () => {
document.getElementById("sizeInfo").innerText =
img.width + " x " + img.height;

document.getElementById("preview").innerHTML = `
<div>
<p>Image originale</p>
<img src="${img.src}" alt="image originale">
</div>
`;
};
};

reader.readAsDataURL(file);
};

/* REDIMENSIONNEMENT */
function resizeImage(){

if(!img.src){
alert("Veuillez ajouter une image !");
return;
}

let newW = parseInt(document.getElementById("newWidth").value);

if(!newW || newW <= 0){
alert("Veuillez entrer une largeur valide !");
return;
}

let ratio = img.height / img.width;
let newH = Math.round(newW * ratio);

let canvas = document.createElement("canvas");
canvas.width = newW;
canvas.height = newH;

canvas.getContext("2d").drawImage(img,0,0,newW,newH);

canvas.toBlob(blob => {

let url = URL.createObjectURL(blob);

document.getElementById("preview").innerHTML += `
<div>

<p>Image redimensionnée</p>

<img src="${url}" alt="image redimensionnée">

<br><br>

<a href="${url}" download="image-redimensionnee.jpg">
<button>Télécharger</button>
</a>

</div>
`;

}, "image/jpeg", 0.9);

}

</script>

<footer>

</footer>

</body>
</html>
