<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resize Image Online Free</title>

<meta name="description" content="Resize images online for free. Change image dimensions easily while keeping high quality. Fast and simple image resizer tool.">
<meta name="robots" content="index, follow">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05070d;
  color:#e6fff9;
  text-align:center;
}

h1{
  margin-top:20px;
  font-size:24px;
  color:#00ffcc;
}

.container{
  max-width:520px;
  margin:auto;
  padding:15px;
}

.box{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(0,255,204,0.2);
  border-radius:10px;
  padding:12px;
  margin-top:12px;
}

input{
  width:70%;
  max-width:220px;
  padding:8px;
  margin-top:5px;
  border:none;
  border-radius:6px;
  outline:none;
}

label{
  display:block;
  margin-top:8px;
  color:#00ffcc;
  font-weight:bold;
  font-size:13px;
}

button{
  margin-top:12px;
  padding:10px 16px;
  background:linear-gradient(90deg,#00ffcc,#7c4dff);
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.preview img{
  max-width:220px;
  margin-top:12px;
  border-radius:8px;
  border:1px solid #00ffcc;
}

footer{
  margin-top:40px;
  padding:20px;
  color:#9fffe6;
  font-size:13px;
  border-top:1px solid rgba(255,255,255,0.1);
}

footer a{
  color:#00ffcc;
  text-decoration:none;
  margin:0 5px;
}
</style>

</head>

<body>

<h1>Resize Image Online</h1>

<p>
Resize images online for free by changing width and height in pixels.
</p>

<div class="container">

<div class="box">

<input type="file" id="file" accept="image/*">

<div class="box">

<label>Largeur actuelle</label>
<input type="number" id="currentW" readonly>

<label>Hauteur actuelle</label>
<input type="number" id="currentH" readonly>

<label>Nouvelle largeur</label>
<input type="number" id="newW">

</div>

<button onclick="resizeImage()">Redimensionner</button>

</div>

<div class="preview" id="preview"></div>

</div>

<!-- FOOTER -->
<footer>
<a href="privacy.html">Privacy Policy</a> |
<a href="contact.html">Contact</a> |
<a href="about.html">About</a>
</footer>

<script>

let img = new Image();

/* LOAD IMAGE */
document.getElementById("file").onchange = (e) => {
const file = e.target.files[0];
if (!file) return;

const reader = new FileReader();

reader.onload = ev => {
img.src = ev.target.result;

img.onload = () => {

document.getElementById("currentW").value = img.width;
document.getElementById("currentH").value = img.height;

document.getElementById("preview").innerHTML = `
<div>
<p>Image originale</p>
<img src="${img.src}" alt="Original image">
</div>
`;
};
};

reader.readAsDataURL(file);
};

/* RESIZE IMAGE */
function resizeImage(){

if(!img.src){
alert("Ajoute une image");
return;
}

let newW = parseInt(document.getElementById("newW").value);

if(!newW || newW <= 0){
alert("Donne une largeur valide");
return;
}

let ratio = img.height / img.width;
let newH = Math.round(newW * ratio);

let canvas = document.createElement("canvas");
canvas.width = newW;
canvas.height = newH;

canvas.getContext("2d").drawImage(img,0,0,newW,newH);

canvas.toBlob(blob => {

let url = URL.createObjectURL(blob);

document.getElementById("preview").innerHTML += `
<div>
<p>Image redimensionnée</p>
<img src="${url}" alt="Resized image">
<br><br>
<a href="${url}" download="resized">
<button>Télécharger</button>
</a>
</div>
`;

});

}

</script>

</body>
</html>
