<script>

let img = new Image();
let originalFileName = "";

/* CHARGEMENT IMAGE */
document.getElementById("file").onchange = (e) => {

  const file = e.target.files[0];
  if (!file) return;

  // 👉 nom propre sans extension
  originalFileName = file.name.replace(/\.[^/.]+$/, "");

  const reader = new FileReader();

  reader.onload = ev => {
    img.src = ev.target.result;

    img.onload = () => {
      document.getElementById("sizeInfo").innerText =
        img.width + " × " + img.height + " px";

      document.getElementById("preview").innerHTML = `
        <div class="box">
          <p>Image originale</p>
          <img src="${img.src}" alt="image originale">
        </div>
      `;
    };
  };

  reader.readAsDataURL(file);
};

/* REDIMENSIONNEMENT */
function resizeImage() {

  if (!img.src) {
    alert("Veuillez ajouter une image !");
    return;
  }

  let newW = parseInt(document.getElementById("newWidth").value);

  if (!newW || newW <= 0) {
    alert("Veuillez entrer une largeur valide !");
    return;
  }

  let ratio = img.height / img.width;
  let newH = Math.round(newW * ratio);

  let canvas = document.createElement("canvas");
  canvas.width = newW;
  canvas.height = newH;

  let ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0, newW, newH);

  canvas.toBlob(blob => {

    if (!blob) {
      alert("Erreur de redimensionnement");
      return;
    }

    let url = URL.createObjectURL(blob);

    document.getElementById("preview").innerHTML += `
      <div class="box">

        <p>Image redimensionnée</p>

        <img src="${url}" alt="image redimensionnée">

        <br><br>

        <a href="${url}" download="${originalFileName}-resized.jpg">
          <button>Télécharger</button>
        </a>

      </div>
    `;

  }, "image/jpeg", 0.92);

}

</script>
