<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Redimensionneur d’images | Image Tools Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Redimensionner une image</h1>
  <p>Changer les dimensions facilement</p>
</header>

<div class="container">

  <div class="box">
    <input type="file" id="file" accept="image/*">

    <br><br>

    <small>Taille : <span id="sizeInfo">-</span></small>

    <br><br>

    <input type="number" id="newWidth" placeholder="Largeur (px)">

    <br><br>

    <button onclick="resizeImage()">Redimensionner</button>
  </div>

  <div class="preview" id="preview"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

let img = new Image();
let originalFileName = "";

/* FILE LOAD */
document.getElementById("file").addEventListener("change", (e) => {

  const file = e.target.files[0];
  if (!file) return;

  originalFileName = file.name.replace(/\.[^/.]+$/, "");

  const reader = new FileReader();

  reader.onload = ev => {
    img.src = ev.target.result;

    img.onload = () => {
      document.getElementById("sizeInfo").innerText =
        img.width + " × " + img.height + " px";

      document.getElementById("preview").innerHTML = `
        <div class="box">
          <p>Image originale</p>
          <img src="${img.src}" style="max-width:100%;border-radius:10px;">
        </div>
      `;
    };
  };

  reader.readAsDataURL(file);
});

/* RESIZE */
window.resizeImage = function () {

  if (!img.src) {
    alert("Ajoute une image !");
    return;
  }

  let newW = parseInt(document.getElementById("newWidth").value);

  if (!newW || newW <= 0) {
    alert("Largeur invalide !");
    return;
  }

  let ratio = img.height / img.width;
  let newH = Math.round(newW * ratio);

  let canvas = document.createElement("canvas");
  canvas.width = newW;
  canvas.height = newH;

  canvas.getContext("2d").drawImage(img, 0, 0, newW, newH);

  canvas.toBlob(blob => {

    let url = URL.createObjectURL(blob);

    document.getElementById("preview").innerHTML += `
      <div class="box">
        <p>Image redimensionnée</p>
        <img src="${url}" style="max-width:100%;border-radius:10px;">

        <br><br>

        <a href="${url}" download="${originalFileName}-resized.jpg">
          <button>Télécharger</button>
        </a>
      </div>
    `;

  }, "image/jpeg", 0.92);
};

});
</script>

</body>
</html>
