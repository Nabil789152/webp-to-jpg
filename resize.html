<script>
document.addEventListener("DOMContentLoaded", () => {

try {

let img = new Image();
let originalFileName = "";

/* ELEMENTS */
const fileInput = document.getElementById("file");
const sizeInfo = document.getElementById("sizeInfo");
const preview = document.getElementById("preview");
const newWidthInput = document.getElementById("newWidth");
const dropZone = document.getElementById("file").parentElement;

/* FILE INPUT */
fileInput.addEventListener("change", handleFile);

/* DRAG & DROP */
if (dropZone) {

  dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.style.border = "2px dashed #1a73e8";
  });

  dropZone.addEventListener("drop", (e) => {
    e.preventDefault();

    const file = e.dataTransfer.files[0];
    if (!file) return;

    fileInput.files = e.dataTransfer.files;
    handleFile({ target: { files: [file] } });
  });
}

/* LOAD IMAGE */
function handleFile(e) {

  const file = e.target.files[0];
  if (!file) return;

  originalFileName = file.name.replace(/\.[^/.]+$/, "");

  const reader = new FileReader();

  reader.onload = ev => {
    img.src = ev.target.result;

    img.onload = () => {
      sizeInfo.innerText = img.width + " × " + img.height + " px";

      preview.innerHTML = `
        <div class="box">
          <p>Image originale</p>
          <img src="${img.src}" style="max-width:100%;border-radius:10px;">
        </div>
      `;
    };
  };

  reader.readAsDataURL(file);
}

/* RESIZE */
window.resizeImage = function () {

  if (!img.src) {
    alert("Ajoute une image !");
    return;
  }

  let newW = parseInt(newWidthInput.value);

  if (!newW) {
    alert("Largeur invalide !");
    return;
  }

  let ratio = img.height / img.width;
  let newH = Math.round(newW * ratio);

  let canvas = document.createElement("canvas");
  canvas.width = newW;
  canvas.height = newH;

  canvas.getContext("2d").drawImage(img, 0, 0, newW, newH);

  canvas.toBlob(blob => {

    let url = URL.createObjectURL(blob);

    preview.innerHTML += `
      <div class="box">
        <p>Image redimensionnée</p>
        <img src="${url}" style="max-width:100%;border-radius:10px;">

        <br><br>

        <a href="${url}" download="${originalFileName}-resized.jpg">
          <button>Télécharger</button>
        </a>
      </div>
    `;

  }, "image/jpeg", 0.92);
};

} catch (err) {
  console.error("ERREUR JS:", err);
}

});
</script>
