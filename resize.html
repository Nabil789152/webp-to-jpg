<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redimensionneur d’images</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f6f9;
}

/* HEADER */
header{
    background:#1e88e5;
    color:white;
    padding:20px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:24px;
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* INPUTS */
input[type="file"]{
    width:100%;
    margin-bottom:15px;
}

label{
    font-weight:bold;
    display:block;
    margin-top:10px;
}

input[type="number"]{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
}

/* BUTTON */
button{
    margin-top:20px;
    width:100%;
    padding:12px;
    background:#1e88e5;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1565c0;
}

/* PREVIEW */
.preview{
    margin-top:20px;
    text-align:center;
}

.preview img{
    max-width:100%;
    border-radius:10px;
    margin-top:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    margin-top:40px;
    background:#222;
    color:#aaa;
}
</style>
</head>

<body>

<header>
    <h1>Redimensionneur d’Images</h1>
</header>

<div class="container">

    <input type="file" id="imageInput" accept="image/*">

    <label>Largeur (px)</label>
    <input type="number" id="width" placeholder="Ex: 800">

    <label>Hauteur (px)</label>
    <input type="number" id="height" placeholder="Ex: 600">

    <button onclick="resizeImage()">Redimensionner</button>

    <div class="preview">
        <h3>Aperçu :</h3>
        <img id="output">
    </div>

    <button id="downloadBtn" style="display:none;">Télécharger l’image</button>

</div>

<footer>
    © 2026 - Outils Image Pro | Développé par Nabil
</footer>

<script>
let originalImage = new Image();

document.getElementById("imageInput").addEventListener("change", function(e){
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(event){
        originalImage.src = event.target.result;
    };
    reader.readAsDataURL(file);
});

function resizeImage(){
    const width = parseInt(document.getElementById("width").value);
    const height = parseInt(document.getElementById("height").value);

    if(!originalImage.src){
        alert("Veuillez choisir une image !");
        return;
    }

    if(!width || !height){
        alert("Veuillez entrer largeur et hauteur !");
        return;
    }

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = width;
    canvas.height = height;

    ctx.drawImage(originalImage, 0, 0, width, height);

    const dataURL = canvas.toDataURL("image/png");

    document.getElementById("output").src = dataURL;

    const downloadBtn = document.getElementById("downloadBtn");
    downloadBtn.style.display = "block";

    downloadBtn.onclick = function(){
        const a = document.createElement("a");
        a.href = dataURL;
        a.download = "resized-image.png";
        a.click();
    };
}
</script>

</body>
</html>
