<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Image Resize Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05070d;
  color:#e6fff9;
  text-align:center;
}

h2{
  color:#00ffcc;
  margin-top:15px;
  font-size:22px;
}

.container{
  max-width:520px;
  margin:auto;
  padding:15px;
}

.box{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(0,255,204,0.2);
  border-radius:10px;
  padding:12px;
  margin-top:12px;
}

input{
  width:70%;
  max-width:220px;
  padding:8px;
  margin-top:5px;
  border:none;
  border-radius:6px;
  outline:none;
  font-size:13px;
}

label{
  display:block;
  margin-top:8px;
  color:#00ffcc;
  font-weight:bold;
  font-size:13px;
}

.unit{
  font-size:11px;
  color:#9fffe6;
  margin-top:2px;
}

button{
  margin-top:12px;
  padding:10px 16px;
  background:linear-gradient(90deg,#00ffcc,#7c4dff);
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  font-size:13px;
}

.preview img{
  max-width:220px;
  margin-top:12px;
  border-radius:8px;
  border:1px solid #00ffcc;
}
</style>
</head>

<body>

<h2>Image Resize Pro</h2>

<div class="container">

<div class="box">

<input type="file" id="file" accept="image/*">

<div class="box">

<label>Largeur actuelle</label>
<div class="unit">Pixels (px)</div>
<input type="number" id="currentW" readonly>

<label>Hauteur actuelle</label>
<div class="unit">Pixels (px)</div>
<input type="number" id="currentH" readonly>

<label>Nouvelle largeur</label>
<div class="unit">Pixels (px)</div>
<input type="number" id="newW">

</div>

<button onclick="resizeImage()">Redimensionner</button>

</div>

<div class="preview" id="preview"></div>

</div>

<script>

let img=new Image();

/* LOAD IMAGE */
document.getElementById("file").onchange=(e)=>{
const file=e.target.files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=ev=>{
img.src=ev.target.result;

img.onload=()=>{

document.getElementById("currentW").value=img.width;
document.getElementById("currentH").value=img.height;

document.getElementById("preview").innerHTML=`
<div>
<p>Image originale</p>
<img src="${img.src}">
</div>
`;
};
};

reader.readAsDataURL(file);
};

/* RESIZE */
function resizeImage(){

if(!img.src){
alert("Ajoute une image");
return;
}

let newW=parseInt(document.getElementById("newW").value);

if(!newW || newW<=0){
alert("Donne une largeur valide");
return;
}

let ratio = img.height / img.width;
let newH = Math.round(newW * ratio);

let canvas=document.createElement("canvas");
canvas.width=newW;
canvas.height=newH;

canvas.getContext("2d").drawImage(img,0,0,newW,newH);

canvas.toBlob(blob=>{

let url=URL.createObjectURL(blob);

document.getElementById("preview").innerHTML+=`
<div>
<p>Image redimensionnée</p>
<img src="${url}">
<br><br>
<a href="${url}" download="resized">
<button>Télécharger</button>
</a>
</div>
`;

});

}

</script>

</body>
</html>
