<body>

<!-- HEADER -->
<header>
  <h1>Resize Image</h1>
  <p>Change image dimensions easily online</p>
</header>

<!-- MAIN -->
<div class="container">

<div class="box">

<input type="file" id="file" accept="image/*">

<div class="box">
<p class="small">Original size: <span id="sizeInfo">-</span></p>
</div>

<label>Nouvelle largeur (px)</label>
<input type="number" id="newWidth" placeholder="ex: 800">

<button onclick="resizeImage()">Redimensionner</button>

</div>

<!-- PREVIEW -->
<div class="preview" id="preview"></div>

</div>

<script>

let img = new Image();

/* LOAD IMAGE */
document.getElementById("file").onchange = (e) => {
const file = e.target.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = ev => {
img.src = ev.target.result;

img.onload = () => {
document.getElementById("sizeInfo").innerText = img.width + " x " + img.height;

document.getElementById("preview").innerHTML = `
<div>
<p>Image originale</p>
<img src="${img.src}" alt="original image">
</div>
`;
};
};

reader.readAsDataURL(file);
};

/* RESIZE */
function resizeImage(){

if(!img.src){
alert("Ajoute une image !");
return;
}

let newW = parseInt(document.getElementById("newWidth").value);

if(!newW || newW <= 0){
alert("Donne une largeur valide !");
return;
}

let ratio = img.height / img.width;
let newH = Math.round(newW * ratio);

let canvas = document.createElement("canvas");
canvas.width = newW;
canvas.height = newH;

canvas.getContext("2d").drawImage(img,0,0,newW,newH);

canvas.toBlob(blob => {

let url = URL.createObjectURL(blob);

document.getElementById("preview").innerHTML += `
<div>

<p>Image redimensionnée</p>

<img src="${url}" alt="resized image">

<br><br>

<a href="${url}" download="resized.jpg">
<button>Télécharger</button>
</a>

</div>
`;

}, "image/jpeg", 0.9);

}

</script>
