<h1>Quels sont les meilleurs formats d’image ?</h1>

<h2>JPG</h2>
<p>Idéal pour les photos.</p>

<h2>PNG</h2>
<p>Idéal pour les images transparentes.</p>

<h2>WebP</h2>
<p>Format moderne, léger et rapide.</p>

<h2>Conclusion</h2>

<p>Le meilleur choix dépend de votre usage. WebP est recommandé pour le web moderne.</p>
