<body>

<div class="top-buttons">
  <a href="index.html">🏠 Accueil</a>
  <a href="resize.html">📏 Redimentionneur</a>
  <a href="compress.html">📦 Compresseur</a>
</div>

<header>
  <h1>📝➡️🗎 PDF vers Word</h1>
  <p>Convertissez vos fichiers PDF en documents Word</p>
</header>

<div class="container">

<div class="card">

<h2>🚀 PDF to Word</h2>

<div class="dropzone" id="drop">
📄 Glisse ton PDF ici ou clique
<input type="file" id="file" accept=".pdf" hidden>
</div>

<canvas id="pdfPreview"></canvas>

<button onclick="convert()">✨ Convertir</button>

</div>

</div>

<footer>
  <p>© 2026 Image Tools Pro</p>
</footer>

<script>

// 👉 PDF.js worker
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const fileInput = document.getElementById("file");
const dropzone = document.getElementById("drop");
const canvas = document.getElementById("pdfPreview");
const ctx = canvas.getContext("2d");

// =====================
// 📄 PREVIEW PDF
// =====================
fileInput.addEventListener("change", async function () {
  const file = this.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = async function () {
    const typedarray = new Uint8Array(this.result);

    const pdf = await pdfjsLib.getDocument({ data: typedarray }).promise;

    const page = await pdf.getPage(1);

    const viewport = page.getViewport({ scale: 1.5 });

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    await page.render({
      canvasContext: ctx,
      viewport: viewport
    }).promise;
  };

  reader.readAsArrayBuffer(file);
});

// =====================
// 📥 CLICK ZONE
// =====================
dropzone.addEventListener("click", () => {
  fileInput.click();
});

// =====================
// 🟢 DRAG OVER
// =====================
dropzone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropzone.classList.add("dragover");
});

// =====================
// 🔴 DRAG LEAVE
// =====================
dropzone.addEventListener("dragleave", () => {
  dropzone.classList.remove("dragover");
});

// =====================
// 📤 DROP FILE
// =====================
dropzone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropzone.classList.remove("dragover");

  const file = e.dataTransfer.files[0];
  if (!file) return;

  const dataTransfer = new DataTransfer();
  dataTransfer.items.add(file);
  fileInput.files = dataTransfer.files;

  fileInput.dispatchEvent(new Event("change"));
});

</script>

</body>
