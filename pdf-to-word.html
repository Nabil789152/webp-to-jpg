<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF to Word SaaS</title>
<meta name="description" content="Convertissez vos documents PDF en WORD en ligne. Outil rapide et sécurisé.">
<meta name="robots" content="index, follow">
<link rel="stylesheet" href="style.css">
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>

<header>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.card{
  background:#111c2e;
  padding:20px;
  border-radius:15px;
}

.dropzone{
  border:2px dashed #3b82f6;
  padding:40px;
  text-align:center;
  cursor:pointer;
  border-radius:10px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}

.progress{
  height:8px;
  background:#1e293b;
  border-radius:10px;
  margin-top:10px;
}

.bar{
  height:100%;
  width:0%;
  background:#22c55e;
}

.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:8px;
  font-size:12px;
  margin-bottom:10px;
}

.free{ background:#f59e0b; }
.pro{ background:#22c55e; }

#preview{
  margin-top:15px;
  white-space:pre-wrap;
  background:#0b1220;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>🚀 PDF to Word SaaS</h2>

<div id="userStatus" class="badge free">MODE FREE</div>

<div class="dropzone" id="drop">
📄 Glisse ton PDF ici
<input type="file" id="file" hidden>
</div>

<button onclick="convert()">✨ Convertir en Word</button>

<button onclick="upgrade()">
💳 Passer en PRO (5€ / mois)
</button>

<div class="progress">
  <div class="bar" id="bar"></div>
</div>

<div id="preview"></div>

</div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

let pdfDoc = null;

// 🟡 MODE USER (FREE / PRO)
let isPro = false;

// 📌 LIMITES FREE
const FREE_LIMIT_PAGES = 2;

document.getElementById("drop").onclick = () =>
  document.getElementById("file").click();

document.getElementById("file").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  const buffer = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({ data: buffer }).promise;

  alert("PDF chargé !");
});

// 🔥 PRO / FREE SWITCH UI
function updateUI(){
  const badge = document.getElementById("userStatus");

  if(isPro){
    badge.innerText = "MODE PRO";
    badge.className = "badge pro";
  }else{
    badge.innerText = "MODE FREE";
    badge.className = "badge free";
  }
}

// 🔥 PRO UPGRADE (Stripe link simple)
function upgrade(){
  window.location.href = "https://buy.stripe.com/TON_LINK_ICI";
}

// 📊 PROGRESS BAR
function updateProgress(v){
  document.getElementById("bar").style.width = v + "%";
}

// 📄 TEXT EXTRACTION
async function extractText(page){
  const content = await page.getTextContent();
  return content.items.map(i => i.str).join(" ");
}

// 👁 OCR (PRO ONLY)
async function ocrPage(canvas){
  const { data } = await Tesseract.recognize(canvas, "fra+eng");
  return data.text;
}

// 🚀 MAIN CONVERT FUNCTION
async function convert(){

  if(!pdfDoc){
    alert("Ajoute un PDF !");
    return;
  }

  const { Document, Packer, Paragraph, TextRun } = window.docx;

  const doc = new Document({
    sections:[{ children:[] }]
  });

  let totalPages = pdfDoc.numPages;

  // ❌ FREE LIMIT
  if(!isPro && totalPages > FREE_LIMIT_PAGES){
    alert("Version FREE limitée à 2 pages. Passe en PRO !");
    return;
  }

  let allText = "";

  for(let i=1;i<=totalPages;i++){

    const page = await pdfDoc.getPage(i);
    const viewport = page.getViewport({ scale: 2 });

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({ canvasContext:ctx, viewport }).promise;

    let text = await extractText(page);

    // 🔥 OCR ONLY IN PRO
    if(isPro && text.trim().length < 10){
      text = await ocrPage(canvas);
    }

    doc.addSection({
      children:[
        new Paragraph({
          children:[
            new TextRun({ text:"Page "+i, bold:true })
          ]
        }),
        new Paragraph(text)
      ]
    });

    updateProgress((i/totalPages)*100);
  }

  const blob = await Packer.toBlob(doc);

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = "PDF-SaaS.docx";
  a.click();

  setTimeout(()=>URL.revokeObjectURL(url),1000);

  document.getElementById("preview").innerText =
    "✅ Conversion terminée";

}

// 🟢 DEMO MODE PRO (test)
document.addEventListener("keydown", (e)=>{
  if(e.key === "p"){
    isPro = true;
    updateUI();
    alert("MODE PRO ACTIVÉ (démo)");
  }
});

updateUI();

</script>

</body>
</html>
