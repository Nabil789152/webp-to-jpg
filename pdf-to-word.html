<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF to Word PRO ULTRA</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card {
  background:#111c2e;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.dropzone {
  border:2px dashed #3b82f6;
  padding:40px;
  text-align:center;
  border-radius:12px;
  cursor:pointer;
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#3b82f6;
  border:none;
  color:white;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

button:hover {
  background:#2563eb;
}

#preview {
  margin-top:15px;
  white-space:pre-wrap;
  background:#0b1220;
  padding:15px;
  border-radius:10px;
  max-height:300px;
  overflow:auto;
}

.progress {
  height:8px;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.bar {
  height:100%;
  width:0%;
  background:#22c55e;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>🚀 PDF to Word PRO ULTRA</h2>

<div class="dropzone" id="drop">
📄 Glisse ton PDF ici
<input type="file" id="file" hidden>
</div>

<div class="progress"><div class="bar" id="bar"></div></div>

<button onclick="convert()">✨ Convertir en Word PRO</button>

<div id="preview"></div>

</div>
</div>
